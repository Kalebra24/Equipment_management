//  SUPABASE CONFIGURATION

//  Find them at: https://supabase.com/dashboard → project →

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvdGN4dGxsZGp3bmd2YWt1dndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTAzNTAsImV4cCI6MjA5NDc2NjM1MH0.trnInb0Cybp8mnOc9QmXkWpzJN4K6Mu55VvYVWfXDYQ';
// ============================================================
//  APP NAMESPACE — must be unique per app sharing this database.
//  Do not change after the first run (keys are stored with this prefix).
// ============================================================
const APP_ID = 'equipment';
// ============================================================

(function () {
  if (SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) {
    const boot = document.getElementById('boot');
    if (boot) {
      boot.innerHTML = `
        <div style="max-width:520px;padding:32px;background:#111827;border:1px solid #1e3a5f;border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;color:#94a3b8;text-align:left">
          <div style="color:#f87171;font-size:15px;font-weight:700;margin-bottom:16px">⚠ Supabase não configurado</div>
          <div style="color:#e2e8f0;margin-bottom:12px">Edite o ficheiro <code style="color:#22d3ee">index.html</code> e preencha:</div>
          <pre style="background:#0f172a;padding:12px;border-radius:6px;color:#22d3ee;overflow:auto">SUPABASE_URL = 'https://xxxx.supabase.co'
SUPABASE_ANON_KEY = 'eyJ...'</pre>
          <div style="margin-top:16px;color:#94a3b8">Consulte o <strong style="color:#e2e8f0">README.md</strong> para instruções completas de setup.</div>
        </div>`;
    }
    return;
  }

  const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  window._db = _supabase;

  // Wraps a Supabase query in a timeout so a slow/unreachable server never
  // blocks the app from loading. Resolves to { data: null, error: null } on timeout.
  function withTimeout(queryPromise, ms) {
    return Promise.race([
      queryPromise,
      new Promise(resolve => setTimeout(() => resolve({ data: null, error: null }), ms)),
    ]);
  }

  window.storage = {
    async get(key) {
      const { data, error } = await withTimeout(
        _supabase.from('app_storage').select('value')
          .eq('app_id', APP_ID).eq('key', key).maybeSingle(),
        8000
      );
      if (error) { console.error('storage.get', error); return null; }
      if (!data) return null;
      return { key, value: data.value };
    },
    async set(key, value) {
      const { error } = await _supabase
        .from('app_storage')
        .upsert(
          { app_id: APP_ID, key, value, updated_at: new Date().toISOString() },
          { onConflict: 'app_id,key' }
        );
      if (error) throw error;
      return { key, value };
    },
    async delete(key) {
      const { error } = await _supabase
        .from('app_storage')
        .delete()
        .eq('app_id', APP_ID)
        .eq('key', key);
      if (error) throw error;
      return { key, deleted: true };
    },
  };
})();

</script>

// ===== Tier classification: configurable thresholds + theme-aware colors =====
// The original "Critérios" sheet uses three independent threshold sets: Total (CPU+GPU), CPU, GPU.
// These are the defaults extracted from the SIGEI export.
const DEFAULT_THRESHOLDS = {
  total: { excellent: 30000, functional: 12000, limited: 5000 },
  cpu:   { excellent: 30000, functional: 15000, limited: 5000 },
  gpu:   { excellent:  8000, functional:  3000, limited: 1000 },
};

const TIERS_ORDER = ['excellent', 'functional', 'limited', 'obsolete'];

const TIER_LABELS = {
  excellent: 'Performance',
  functional: 'Funcional',
  limited: 'Limitado',
  obsolete: 'Obsoleto',
};

const tierColors = (t) => ({
  excellent: { color: t.successText, dot: t.success },
  functional: { color: t.infoText, dot: t.info },
  limited: { color: t.warningText, dot: t.warning },
  obsolete: { color: t.dangerText, dot: t.danger },
});

// Build a tier descriptor for a given metric (total/cpu/gpu) using the active thresholds + theme.
const buildTier = (key, kind, thresholds, t) => {
  const th = thresholds[kind];
  const colors = tierColors(t)[key];
  let min, max;
  if (key === 'excellent')      { min = th.excellent;  max = Infinity; }
  else if (key === 'functional') { min = th.functional; max = th.excellent; }
  else if (key === 'limited')    { min = th.limited;    max = th.functional; }
  else                           { min = 0;             max = th.limited; }
  return { key, label: TIER_LABELS[key], color: colors.color, dot: colors.dot, min, max };
};

// Classify a numeric score against a given threshold set.
const classify = (score, kind, thresholds, t) => {
  for (const k of TIERS_ORDER) {
    const tier = buildTier(k, kind, thresholds, t);
    if (score >= tier.min && score < tier.max) return tier;
  }
  return buildTier('obsolete', kind, thresholds, t);
};

// Backwards-compatible helper for the most common case (Total score classification).
const classifyTotal = (score, thresholds, t) => classify(score, 'total', thresholds, t);

};

// Today as YYYY-MM-DD (local) — used for confirmation timestamps.
const todayISO = () => {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
};

// Days since an ISO date (YYYY-MM-DD). Returns null if no/invalid date.
const daysSince = (iso) => {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / (24 * 60 * 60 * 1000));
};

// Classify review age into a colored tier (theme-aware).
// Thresholds: < 90 days = recent, 90–180 = ageing, > 180 = stale, never = unknown.
const reviewTier = (lastReview, t) => {
  const days = daysSince(lastReview);
  if (days === null) return { key: 'never',  label: 'Por confirmar', color: t.textDim,      dot: t.textFaint, days: null };
  if (days <= 90)    return { key: 'recent', label: 'Recente',       color: t.successText,  dot: t.success,   days };
  if (days <= 180)   return { key: 'ageing', label: 'A envelhecer',  color: t.warningText,  dot: t.warning,   days };
  return                    { key: 'stale',  label: 'Antiga',        color: t.dangerText,   dot: t.danger,    days };
};

// Schema migration version for PC records. Bumped whenever the function code
// vocabulary changes in a way that requires data rewrites.
const PCS_SCHEMA_VERSION = 2;

// Apply v1 → v2 migration: rename DN→DU, drop old "DU" (Disp. Uso) and "Service"
// since DN now collides with the old DU meaning, we apply DU→'' first, then DN→DU.
// Returns the migrated list of PCs.
const migratePcsV1toV2 = (pcs) => pcs.map(p => {
  if (!p.funcao) return p;
  let nf = p.funcao;
  // Old DU (Disp. Uso) and Service no longer exist as functions — clear them
  if (nf === 'DU' || nf === 'Service') nf = '';
  // DN (Direção) becomes DU (Director Unidade)
  if (p.funcao === 'DN') nf = 'DU';
  return { ...p, funcao: nf };
});

// Backwards-compat alias used in legacy code paths (read-only).

// ===== Computer age =====
// Compute the displayed age, prioritising explicit `idadeAnos` if provided,
// otherwise deriving from `ano`. Returns null if neither is set or invalid.
const computerAge = (ano, idadeAnos) => {
  const a = Number(idadeAnos);
  if (isFinite(a) && a > 0) return a;
  const y = Number(ano);
  if (isFinite(y) && y >= 1980 && y <= new Date().getFullYear() + 1) {
    return new Date().getFullYear() - y;
  }
  return null;
};

// ===== Storage hooks =====
const useStorage = () => {
  const [pcs, setPcs] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const stored = await window.storage.get(STORAGE_KEY);
        const meta = await window.storage.get(META_KEY).catch(() => null);
        const versionRec = await window.storage.get(SCHEMA_VERSION_KEY).catch(() => null);
        const storedVersion = versionRec?.value ? Number(versionRec.value) : 1;

        if (stored && stored.value) {
          let loadedPcs = JSON.parse(stored.value);
          // Apply migrations as needed
          if (storedVersion < 2) {
            loadedPcs = migratePcsV1toV2(loadedPcs);
            // Persist the migrated data + bump version so we don't run again
            await window.storage.set(STORAGE_KEY, JSON.stringify(loadedPcs));
            await window.storage.set(SCHEMA_VERSION_KEY, String(PCS_SCHEMA_VERSION));
          }
          setPcs(loadedPcs);
          if (meta?.value) setLastSaved(meta.value);
        } else {
          // First run: seed data needs the same migration since it ships with old codes
          const seeded = migratePcsV1toV2(SEED_DATA);
          setPcs(seeded);
          await window.storage.set(STORAGE_KEY, JSON.stringify(seeded));
          await window.storage.set(SCHEMA_VERSION_KEY, String(PCS_SCHEMA_VERSION));
          const now = new Date().toISOString();
          await window.storage.set(META_KEY, now);
          setLastSaved(now);
        }
      } catch {
        setPcs(migratePcsV1toV2(SEED_DATA));
      }
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => {
    setPcs(next);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
      const now = new Date().toISOString();
      await window.storage.set(META_KEY, now);
      setLastSaved(now);
    } catch (e) { console.error('Save failed', e); }
  };

  const reset = async () => { await persist(migratePcsV1toV2(SEED_DATA)); };

  return { pcs, setPcs: persist, loaded, lastSaved, reset };
};

const usePeripheralsStorage = () => {
  const [items, setItems] = useState([]);

        if (stored?.value) {
          setItems(JSON.parse(stored.value));
        }
      } catch {}
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => {

// Custom functions: extends DEFAULT_FUNCAO_LABELS with user-defined entries.
// Defaults are read-only (cannot be removed); custom entries can be added/removed freely.
const useFunctionsPersisted = () => {
  const [custom, setCustomState] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const stored = await window.storage.get(FUNCTIONS_KEY);
        if (stored?.value) {
          const parsed = JSON.parse(stored.value);
          if (parsed && typeof parsed === 'object') setCustomState(parsed);
        }
      } catch {}
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => {
    setCustomState(next);
    try { await window.storage.set(FUNCTIONS_KEY, JSON.stringify(next)); }
    catch (e) { console.error('Functions save failed', e); }
  };

  const addFunction = async (code, label) => {
    const k = (code || '').trim();
    const v = (label || '').trim();
    if (!k || !v) return { ok: false, error: 'Código e descrição são obrigatórios.' };
    if (DEFAULT_FUNCAO_LABELS[k]) return { ok: false, error: `O código "${k}" já existe nas funções padrão.` };
    if (custom[k]) return { ok: false, error: `O código "${k}" já existe nas suas funções personalizadas.` };
    await persist({ ...custom, [k]: v });
    return { ok: true };
  };

  const removeFunction = async (code) => {
    if (DEFAULT_FUNCAO_LABELS[code]) return { ok: false, error: 'Funções padrão não podem ser removidas.' };
    if (!custom[code]) return { ok: false, error: 'Função não encontrada.' };
    const next = { ...custom };
    delete next[code];
    await persist(next);
    return { ok: true };
  };

  // Combined map of default + custom (custom can never override default keys)
  const allLabels = useMemo(
    () => ({ ...DEFAULT_FUNCAO_LABELS, ...custom }),
    [custom]
  );

  const isCustom = (code) => !DEFAULT_FUNCAO_LABELS[code] && !!custom[code];

  // Bulk replace (used by backup import). Accepts a plain object {code: label, ...}.
  const replaceCustomFunctions = async (next) => {
    const safe = (next && typeof next === 'object' && !Array.isArray(next)) ? next : {};
    // Filter out any keys that collide with defaults to avoid masking them
    const filtered = {};
    for (const [k, v] of Object.entries(safe)) {
      if (typeof k === 'string' && typeof v === 'string' && !DEFAULT_FUNCAO_LABELS[k]) {
        filtered[k] = v;
      }
    }
    await persist(filtered);
  };

  return { custom, allLabels, isCustom, addFunction, removeFunction, replaceCustomFunctions, loaded };
};

const validateThresholds = (obj) => {
  // Ensure shape & ordering: excellent > functional > limited > 0
  if (!obj || typeof obj !== 'object') return null;
  const out = {};
  for (const kind of ['total', 'cpu', 'gpu']) {
    const src = obj[kind];
    if (!src || typeof src !== 'object') return null;
    const e = Number(src.excellent), f = Number(src.functional), l = Number(src.limited);
    if (!isFinite(e) || !isFinite(f) || !isFinite(l)) return null;
    if (!(e > f && f > l && l > 0)) return null;
    out[kind] = { excellent: e, functional: f, limited: l };
  }
  return out;
};

  return { thresholds, setThresholds, resetThresholds, loaded };
};

// ===== Recompute totals & ranks =====
const recomputeRanks = (list) => {
  const withTotals = list.map(p => ({
    ...p,
    totalScore: (Number(p.cpuScore) || 0) + (Number(p.gpuScore) || 0),
  }));
  const sorted = [...withTotals].sort((a, b) => b.totalScore - a.totalScore);
  const rankMap = new Map();
  let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].totalScore !== sorted[i - 1].totalScore) rank = i + 1;
    rankMap.set(sorted[i].pc, rank);
  }
  return withTotals.map(p => ({ ...p, rank: rankMap.get(p.pc) }));
};

const normalizeModelName = (s) => {
  if (!s) return '';
  let q = s.toLowerCase().trim();
  q = q.replace(/\(r\)|\(tm\)/g, '');
  q = q.replace(/\b(intel|amd|nvidia|geforce|core|cpu|gpu|processor|generation|graphics|adapter|microsoft|remote|display|family|wddm|hexacoreintel|quadcoreintel|octacoreintel|hexacoreamd)\b/g, '');
  q = q.replace(/@.*?ghz/g, '');
  q = q.replace(/\d+\.\d+\s*ghz/g, '');
  q = q.replace(/(quadcore|hexacore|octacore|dualcore)/g, '');
  q = q.replace(/\s+/g, ' ').trim();
  return q;
};

const lookupBenchmarkLocal = (kind, modelName) => {
  if (!modelName || !modelName.trim()) return null;
  const table = kind === 'cpu' ? BENCHMARK_DB.cpus : BENCHMARK_DB.gpus;
  const q = normalizeModelName(modelName);
  if (!q) return null;

  // Exact match
  if (table[q] != null) {
    return { score: table[q], matched: q, method: 'exact' };
  }

  // Substring match — prefer longest key (most specific variant, e.g. "rtx 4000 ada laptop" over "rtx 4000 ada")
  const matching = Object.keys(table)
    .filter(k => q.indexOf(k) !== -1)
    .sort((a, b) => b.length - a.length);
  if (matching.length > 0) {
    return { score: table[matching[0]], matched: matching[0], method: 'substring' };
  }

  // Token match fallback
  const tokens = q.match(/[a-z0-9]+(?:-[a-z0-9]+)*/g) || [];
  for (const tok of tokens) {
    if (table[tok] != null) {
      return { score: table[tok], matched: tok, method: 'token' };
    }
  }

  return null;
};

const passmarkSearchUrl = (kind, modelName) => {
  const base = kind === 'cpu'
    ? 'https://www.cpubenchmark.net/cpu_lookup.php?cpu='
    : 'https://www.videocardbenchmark.net/gpu_lookup.php?gpu=';
  return base + encodeURIComponent(modelName);
};

};

// ===== Dashboard =====
const REVIEW_BREAKDOWN_LABELS = {
  recent: 'Recente (<90d)', ageing: 'A envelhecer (90–180d)',
  stale: 'Antiga (>180d)', never: 'Por confirmar',
};

const Dashboard = ({ pcs, onNavigate }) => {
  const t = useTheme();
  const thresholds = useThresholdsCtx();
  const { allLabels: funcaoLabels } = useFunctions();
  const stats = useMemo(() => {
    const total = pcs.length;
    const buckets = { excellent: 0, functional: 0, limited: 0, obsolete: 0 };
    let totalRam = 0, totalDisk = 0;
    const funcao = {}, estado = {}, disponibilidade = {}, ubicacao = {}, ramBands = {}, anos = {};
    let anoSum = 0, anoCount = 0, available = 0;
    const currentYear = new Date().getFullYear();
    pcs.forEach(p => {
      const tier = classifyTotal(p.totalScore || 0, thresholds, t);
      buckets[tier.key]++;
      totalRam += (p.memMB || 0);
      totalDisk += parseDiskTotal(p.disks);
      if (p.funcao) funcao[p.funcao] = (funcao[p.funcao] || 0) + 1;
      if (p.estado) estado[p.estado] = (estado[p.estado] || 0) + 1;
      const d = p.disponibilidade || 'outro';
      disponibilidade[d] = (disponibilidade[d] || 0) + 1;
      if (p.disponibilidade === 'disponivel') available++;
      const loc = (p.ubicacao || '').trim();
      if (loc) ubicacao[loc] = (ubicacao[loc] || 0) + 1;
      const ramGB = (p.memMB || 0) / 1024;
      const band = ramGB < 8 ? '< 8 GB' : ramGB < 16 ? '8–15 GB' : ramGB < 32 ? '16–31 GB' : ramGB < 64 ? '32–63 GB' : '≥ 64 GB';
      ramBands[band] = (ramBands[band] || 0) + 1;
      if (p.ano && Number(p.ano) > 2000) { const yr = String(p.ano); anos[yr] = (anos[yr] || 0) + 1; anoSum += Number(p.ano); anoCount++; }
    });
    const avgAge = anoCount > 0 ? Math.round(currentYear - anoSum / anoCount) : null;
    const now = Date.now();
    const stale = pcs.filter(p => {
      if (!p.ultComunic) return false;
      const d = new Date(p.ultComunic.replace(' ', 'T'));
      return (now - d.getTime()) > 30 * 24 * 60 * 60 * 1000;
    }).length;
    const reviewBuckets = { recent: 0, ageing: 0, stale: 0, never: 0 };
    pcs.forEach(p => { const rt = reviewTier(p.lastReview, t); reviewBuckets[rt.key]++; });
    return { total, buckets, totalRam, totalDisk, funcao, estado, disponibilidade, ubicacao, ramBands, anos, stale, reviewBuckets, avgAge, available };
  }, [pcs, t, thresholds]);

  const tiersSorted = TIERS_ORDER.map(k => buildTier(k, 'total', thresholds, t));
  const needsReview = stats.reviewBuckets.never + stats.reviewBuckets.stale;
  const nav = (filters) => onNavigate && onNavigate('inventory', filters);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 14 }}>
        <Stat label="Total Equipamentos" value={stats.total} sub="UMEC inventory" accent={t.accent} icon={Monitor} />
        <Stat label="Memória Agregada" value={`${Math.round(stats.totalRam / 1024)} GB`} sub="RAM total" accent={t.purple} icon={MemoryStick} />
        <Stat label="Armazenamento" value={`${(stats.totalDisk / 1000).toFixed(1)} TB`} sub="Capacidade total" accent={t.warning} icon={HardDrive} />
        <Stat label="A confirmar" value={needsReview}
          sub={`${stats.reviewBuckets.never} nunca · ${stats.reviewBuckets.stale} antigas`}
          accent={needsReview > 0 ? t.warning : t.success} icon={CheckCircle2}
          onClick={needsReview > 0 ? () => nav({ reviewFilter: 'never' }) : undefined} />
        <Stat label="Idade Média" value={stats.avgAge !== null ? `${stats.avgAge} anos` : '—'} sub="média da frota"
          accent={stats.avgAge !== null && stats.avgAge > 5 ? t.warning : t.success} icon={Calendar} />
        <Stat label="Disponíveis" value={stats.available} sub="equipamentos livres"
          accent={stats.available > 0 ? t.success : t.textDim} icon={PackageCheck}
          onClick={stats.available > 0 ? () => nav({ disponibilidadeFilter: 'disponivel' }) : undefined} />
      </div>

      <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, padding: 22, boxShadow: t.shadow }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 11, color: t.textDim, letterSpacing: '0.12em', textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace' }}>
              Distribuição por nível de performance</div>
            <div style={{ fontSize: 18, color: t.text, marginTop: 4, fontWeight: 500 }}>Pontuação Total (CPU + GPU)</div>
          </div>
          <div style={{ fontSize: 11, color: t.textDim, fontFamily: 'JetBrains Mono, monospace' }}>n = {stats.total}</div>
        </div>

        <div style={{ display: 'flex', height: 36, borderRadius: 4, overflow: 'hidden', marginBottom: 14 }}>
          {tiersSorted.map(tier => {
            const count = stats.buckets[tier.key];
            const pct = (count / stats.total) * 100;
            if (count === 0) return null;
            return (
              <div key={tier.key} onClick={() => nav({ tierFilter: tier.key })} style={{
                width: `${pct}%`, background: tier.color, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12, color: t.name === 'dark' ? '#0a0f17' : '#fff', fontWeight: 700,
                fontFamily: 'JetBrains Mono, monospace', transition: 'opacity 0.15s',
              }}
              onMouseEnter={e => { e.currentTarget.style.opacity = '0.75'; }}
              onMouseLeave={e => { e.currentTarget.style.opacity = '1'; }}
              >{count}</div>
            );
          })}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 12 }}>
          {tiersSorted.map(tier => {
            const count = stats.buckets[tier.key];
            const pct = ((count / stats.total) * 100).toFixed(1);
            return (
              <div key={tier.key} onClick={() => nav({ tierFilter: tier.key })} style={{
                padding: 12, borderRadius: 6, background: t.bgPanelAlt,
                border: `1px solid ${tier.color}30`, cursor: 'pointer', transition: 'border-color 0.15s',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = tier.color; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = `${tier.color}30`; }}
              >
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <span style={{ width: 8, height: 8, borderRadius: '50%', background: tier.dot }} />
                  <span style={{ fontSize: 11, color: t.textSecondary, textTransform: 'uppercase', letterSpacing: '0.08em', fontFamily: 'JetBrains Mono, monospace' }}>{tier.label}</span>
                </div>
                <div style={{ fontSize: 22, color: tier.color, fontWeight: 700, fontFamily: 'JetBrains Mono, monospace' }}>
                  {count} <span style={{ fontSize: 12, color: t.textDim }}>({pct}%)</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 14 }}>
        <BreakdownCard title="Função do Utilizador" data={stats.funcao} labelMap={funcaoLabels}
          onRowClick={f => nav({ funcaoFilter: f })} />
        <BreakdownCard title="Estado" data={stats.estado}
          onRowClick={e => nav({ estadoFilter: e })} />
        <BreakdownCard title="Disponibilidade" data={stats.disponibilidade} labelMap={DISPONIBILIDADE_LABELS}
          onRowClick={d => nav({ disponibilidadeFilter: d })} />
        <BreakdownCard title="Localização" data={stats.ubicacao}
          onRowClick={loc => nav({ ubicacaoFilter: loc })} />
        <BreakdownCard title="RAM por Banda" data={stats.ramBands} />
        <BreakdownCard title="Ano de Compra" data={stats.anos} />
        <BreakdownCard title="Estado de Revisão" data={stats.reviewBuckets} labelMap={REVIEW_BREAKDOWN_LABELS}
          onRowClick={k => nav({ reviewFilter: k })} />
      </div>
    </div>
  );
};

const BreakdownCard = ({ title, data, labelMap = {}, onRowClick }) => {
  const t = useTheme();
  const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
  const max = Math.max(...entries.map(e => e[1]), 1);
  return (
    <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, padding: 18, boxShadow: t.shadow }}>
      <div style={{
        fontSize: 11, color: t.textDim, letterSpacing: '0.12em',
        textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace',
        marginBottom: 14,
      }}>{title}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {entries.slice(0, 8).map(([key, count]) => (
          <div key={key}
            onClick={onRowClick ? () => onRowClick(key) : undefined}
            style={{
              display: 'flex', alignItems: 'center', gap: 10,
              cursor: onRowClick ? 'pointer' : 'default',
              borderRadius: 4, padding: '2px 4px', margin: '-2px -4px',
              transition: 'background 0.12s',
            }}
            onMouseEnter={onRowClick ? e => { e.currentTarget.style.background = t.bgPanelAlt; } : undefined}
            onMouseLeave={onRowClick ? e => { e.currentTarget.style.background = 'transparent'; } : undefined}
          >
            <div style={{ fontSize: 12, color: t.textSecondary, minWidth: 100, fontWeight: 500 }}>
              {labelMap[key] || key}
            </div>
            <div style={{ flex: 1, height: 6, background: t.barTrack, borderRadius: 3, overflow: 'hidden' }}>
              <div style={{
                height: '100%', width: `${(count / max) * 100}%`,
                background: `linear-gradient(90deg, ${t.accent}, ${t.accentDim})`,
                borderRadius: 3,
              }} />
            </div>
            <div style={{
              fontSize: 12, color: t.accent, fontFamily: 'JetBrains Mono, monospace',
              minWidth: 24, textAlign: 'right', fontWeight: 600,
            }}>{count}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

const ConfirmLinksModal = ({ pcs, onClose }) => {
  const t = useTheme();
  const btn = useButtonStyles();
  const [confirmations, setConfirmations] = useState(null); // map pc → latest confirmed_at
  const [copied, setCopied] = useState('');

  const base = (() => {
    const { origin, pathname } = window.location;
    return origin + pathname.replace(/[^/]*$/, '');
  })();

  const rows = useMemo(() => {
    return pcs
      .filter(p => p.utilizador)
      .map(p => ({
        pc: p.pc,
        user: (p.utilizador || '').replace(/^.*\\/, ''),
        url: base + 'confirm.html?pc=' + encodeURIComponent(p.pc),
        confirmedAt: confirmations ? (confirmations[p.pc] || null) : undefined,
      }));
  }, [pcs, confirmations, base]);

  useEffect(() => {
    if (!window._db) return;
    window._db.from('equipment_confirmations')
      .select('pc, confirmed_at')
      .order('confirmed_at', { ascending: false })
      .then(({ data }) => {
        if (!data) return;
        const map = {};
        data.forEach(r => { if (!map[r.pc]) map[r.pc] = r.confirmed_at; });
        setConfirmations(map);
      })
      .catch(() => setConfirmations({}));
  }, []);

  const copyOne = (url, pc) => {
    navigator.clipboard.writeText(url).then(() => {
      setCopied(pc);
      setTimeout(() => setCopied(''), 2000);
    });
  };

  const copyAll = () => {
    const text = rows.map(r => `${r.user} (${r.pc})\n${r.url}`).join('\n\n');
    navigator.clipboard.writeText(text).then(() => {
      setCopied('__all__');
      setTimeout(() => setCopied(''), 2000);
    });
  };

  const confirmed = rows.filter(r => r.confirmedAt).length;

  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,.7)', zIndex: 1000,
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16,
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 10,
        width: '100%', maxWidth: 720, maxHeight: '85vh', display: 'flex', flexDirection: 'column',
        boxShadow: '0 24px 64px rgba(0,0,0,.6)',
      }}>
        {/* Header */}
        <div style={{ padding: '20px 24px 16px', borderBottom: `1px solid ${t.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: t.text }}>Pedidos de Confirmação</div>
            <div style={{ fontSize: 12, color: t.textDim, marginTop: 4 }}>
              {rows.length} utilizadores · {confirmed} responderam
              {confirmations === null && <span style={{ color: t.accent }}> · a verificar respostas…</span>}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={copyAll} style={{ ...btn.ghost, fontSize: 11 }}>
              {copied === '__all__' ? '✓ Copiado!' : <><Link2 size={12} /> Copiar Todos</>}
            </button>
            <IconBtn onClick={onClose} title="Fechar"><X size={14} /></IconBtn>
          </div>
        </div>

        {/* Instruction */}
        <div style={{ padding: '12px 24px', background: t.bgPanelAlt, borderBottom: `1px solid ${t.border}`, fontSize: 12, color: t.textDim, flexShrink: 0 }}>
          Copie o link de cada utilizador e envie por email. O utilizador abre o link, confirma os dados e submete o formulário.
        </div>

        {/* Table */}
        <div style={{ overflowY: 'auto', flex: 1 }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: t.bgPanelAlt }}>
                {['Utilizador', 'PC', 'Resposta', ''].map(h => (
                  <th key={h} style={{ padding: '10px 16px', textAlign: 'left', fontSize: 10, color: t.textDim, textTransform: 'uppercase', letterSpacing: '.1em', fontFamily: 'JetBrains Mono, monospace', borderBottom: `1px solid ${t.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.pc} style={{ borderBottom: `1px solid ${t.bgHover}` }}>
                  <td style={{ padding: '10px 16px', color: t.text, fontWeight: 500 }}>{r.user}</td>
                  <td style={{ padding: '10px 16px', fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: t.textDim }}>{r.pc}</td>
                  <td style={{ padding: '10px 16px' }}>
                    {r.confirmedAt === undefined
                      ? <span style={{ color: t.textFaint, fontSize: 11 }}>…</span>
                      : r.confirmedAt
                        ? <span style={{ color: t.success, fontSize: 11, fontFamily: 'JetBrains Mono, monospace' }}>✓ {r.confirmedAt.slice(0, 10)}</span>
                        : <span style={{ color: t.textFaint, fontSize: 11 }}>Pendente</span>
                    }
                  </td>
                  <td style={{ padding: '10px 16px', textAlign: 'right' }}>
                    <button onClick={() => copyOne(r.url, r.pc)} style={{
                      ...btn.ghost, fontSize: 11, padding: '6px 10px',
                      color: copied === r.pc ? t.success : t.textMuted,
                      borderColor: copied === r.pc ? t.success : t.border,
                    }}>
                      {copied === r.pc ? '✓ Copiado' : <><Link2 size={11} /> Link</>}
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ===== Inventory table =====
const Inventory = ({ pcs, onEdit, onDelete, onAdd, onConfirm, onShowLinks, navFilters, navSeq, onAbate, onRestore, onMarkLost, onRestoreLost }) => {
  const t = useTheme();
  const thresholds = useThresholdsCtx();
  const { allLabels: funcaoLabels } = useFunctions();
  const btn = useButtonStyles();
  const [search, setSearch] = useState('');
  const [tierFilter, setTierFilter] = useState('all');
  const [showAbated, setShowAbated] = useState(false);
  const [showPerdido, setShowPerdido] = useState(false);
  const [funcaoFilter, setFuncaoFilter] = useState('all');
  const [estadoFilter, setEstadoFilter] = useState('all');
  const [reviewFilter, setReviewFilter] = useState('all');
  const [disponibilidadeFilter, setDisponibilidadeFilter] = useState('all');
  const [ubicacaoFilter, setUbicacaoFilter] = useState('all');
  const [sortBy, setSortBy] = useState('rank');
  const [sortDir, setSortDir] = useState('asc');

  useEffect(() => {
    if (!navSeq) return;
    setTierFilter(navFilters.tierFilter || 'all');
    setFuncaoFilter(navFilters.funcaoFilter || 'all');
    setEstadoFilter(navFilters.estadoFilter || 'all');
    setReviewFilter(navFilters.reviewFilter || 'all');
    setDisponibilidadeFilter(navFilters.disponibilidadeFilter || 'all');
    setUbicacaoFilter(navFilters.ubicacaoFilter || 'all');
    setSearch(navFilters.search || '');
  }, [navSeq]);

  const funcoes = useMemo(() => [...new Set(pcs.map(p => p.funcao).filter(Boolean))].sort(), [pcs]);
  const estados = useMemo(() => [...new Set(pcs.map(p => p.estado).filter(Boolean))].sort(), [pcs]);

  // Derive available locations from the set already filtered by every criterion EXCEPT location,
  // so the dropdown only shows locations that have at least one matching PC.
  const preFilteredForUbicacao = useMemo(() => pcs.filter(p => {
    if (!showAbated && p.abatido) return false;
    if (!showPerdido && p.perdido) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!`${p.pc} ${p.utilizador} ${p.cpuClean} ${p.gpuClean} ${p.cpu} ${p.gpu}`.toLowerCase().includes(s)) return false;
    }
    if (tierFilter !== 'all') {
      const tier = classifyTotal(p.totalScore || 0, thresholds, t);
      if (tier.key !== tierFilter) return false;
    }
    if (funcaoFilter !== 'all' && p.funcao !== funcaoFilter) return false;
    if (estadoFilter !== 'all' && p.estado !== estadoFilter) return false;
    if (reviewFilter !== 'all') {
      const rt = reviewTier(p.lastReview, t);
      if (rt.key !== reviewFilter) return false;
    }
    if (disponibilidadeFilter !== 'all') {
      const d = p.disponibilidade || 'outro';
      if (d !== disponibilidadeFilter) return false;
    }
    return true;
  }), [pcs, showAbated, showPerdido, search, tierFilter, funcaoFilter, estadoFilter, reviewFilter, disponibilidadeFilter, t, thresholds]);

  const ubicacoes = useMemo(() =>
    [...new Set(preFilteredForUbicacao.map(p => (p.ubicacao || '').trim()).filter(Boolean))].sort(),
  [preFilteredForUbicacao]);

  // Auto-reset location filter when the selected value is no longer available
  useEffect(() => {
    if (ubicacaoFilter !== 'all' && !ubicacoes.includes(ubicacaoFilter)) {
      setUbicacaoFilter('all');
    }
  }, [ubicacoes, ubicacaoFilter]);

  const filtered = useMemo(() => {
    let result = pcs.filter(p => {
      if (!showAbated && p.abatido) return false;
      if (!showPerdido && p.perdido) return false;
      if (search) {
        const s = search.toLowerCase();
        if (!`${p.pc} ${p.utilizador} ${p.cpuClean} ${p.gpuClean} ${p.cpu} ${p.gpu}`.toLowerCase().includes(s)) return false;
      }
      if (tierFilter !== 'all') {
        const tier = classifyTotal(p.totalScore || 0, thresholds, t);
        if (tier.key !== tierFilter) return false;
      }
      if (funcaoFilter !== 'all' && p.funcao !== funcaoFilter) return false;
      if (estadoFilter !== 'all' && p.estado !== estadoFilter) return false;
      if (reviewFilter !== 'all') {
        const rt = reviewTier(p.lastReview, t);
        if (rt.key !== reviewFilter) return false;
      }
      if (disponibilidadeFilter !== 'all') {
        const d = p.disponibilidade || 'outro';
        if (d !== disponibilidadeFilter) return false;
      }
      if (ubicacaoFilter !== 'all' && (p.ubicacao || '').trim() !== ubicacaoFilter) return false;
      return true;
    });
    result.sort((a, b) => {
      let av = a[sortBy], bv = b[sortBy];
      // Sorting by lastReview: nulls go last in ASC (i.e. "never confirmed" deserves attention but treated as oldest in DESC)
      if (sortBy === 'lastReview') {
        const ad = daysSince(a.lastReview);
        const bd = daysSince(b.lastReview);
        // Larger days = more stale. Sort ascending = most recent first.
        // Treat null (never) as +Infinity → most stale
        av = ad === null ? Infinity : ad;
        bv = bd === null ? Infinity : bd;
      } else {
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
        if (av == null) av = sortDir === 'asc' ? Infinity : -Infinity;
        if (bv == null) bv = sortDir === 'asc' ? Infinity : -Infinity;
      }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return result;
  }, [pcs, showAbated, showPerdido, search, tierFilter, funcaoFilter, estadoFilter, reviewFilter, disponibilidadeFilter, ubicacaoFilter, sortBy, sortDir, t, thresholds]);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('asc'); }
  };

  const td = { padding: '11px 10px', color: t.textSecondary, verticalAlign: 'middle' };
  const tdMono = { ...td, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 };

  const SortHeader = ({ col, label, align = 'left' }) => (
    <th style={{
      padding: '12px 10px', textAlign: align, fontSize: 10,
      color: t.textDim, textTransform: 'uppercase', letterSpacing: '0.1em',
      fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
      borderBottom: `1px solid ${t.border}`, cursor: 'pointer', userSelect: 'none',
      whiteSpace: 'nowrap',
    }} onClick={() => toggleSort(col)}>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
        {label}
        {sortBy === col && (sortDir === 'asc' ? <ChevronUp size={11} /> : <ChevronDown size={11} />)}
        {sortBy !== col && <ArrowUpDown size={10} style={{ opacity: 0.3 }} />}
      </span>
    </th>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{
        display: 'flex', flexWrap: 'wrap', gap: 10,
        background: t.bgPanel, padding: 14, borderRadius: 8,
        border: `1px solid ${t.border}`, boxShadow: t.shadow,
      }}>
        <div style={{ position: 'relative', flex: '1 1 240px', minWidth: 200 }}>
          <Search size={14} style={{
            position: 'absolute', left: 12, top: '50%',
            transform: 'translateY(-50%)', color: t.textDim,
          }} />
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="PC, utilizador, CPU, GPU..."
            style={{
              width: '100%', padding: '9px 12px 9px 36px', background: t.bgPanelAlt,
              border: `1px solid ${t.border}`, borderRadius: 6, color: t.text,
              fontSize: 13, outline: 'none', boxSizing: 'border-box',
            }} />
        </div>

        <FilterSelect value={tierFilter} onChange={setTierFilter} options={[
          { v: 'all', l: 'Todos os níveis' },
          ...TIERS_ORDER.map(k => ({ v: k, l: TIER_LABELS[k] })),
        ]} />
        <FilterSelect value={funcaoFilter} onChange={setFuncaoFilter} options={[
          { v: 'all', l: 'Todas as funções' },
          ...funcoes.map(f => ({ v: f, l: funcaoLabels[f] || f })),
        ]} />
        <FilterSelect value={estadoFilter} onChange={setEstadoFilter} options={[
          { v: 'all', l: 'Todos os estados' },
          ...estados.map(e => ({ v: e, l: e })),
        ]} />
        <FilterSelect value={reviewFilter} onChange={setReviewFilter} options={[
          { v: 'all', l: 'Todas as confirmações' },
          { v: 'never',  l: '⚠ Por confirmar' },
          { v: 'stale',  l: '● Confirmação antiga (>180d)' },
          { v: 'ageing', l: '● A envelhecer (90-180d)' },
          { v: 'recent', l: '● Recente (<90d)' },
        ]} />
        <FilterSelect value={disponibilidadeFilter} onChange={setDisponibilidadeFilter} options={[
          { v: 'all', l: 'Toda a disponibilidade' },
          ...DISPONIBILIDADE_VALUES.map(d => ({ v: d, l: DISPONIBILIDADE_LABELS[d] })),
        ]} />
        <FilterSelect value={ubicacaoFilter} onChange={setUbicacaoFilter} options={[
          { v: 'all', l: 'Todas as localizações' },
          ...ubicacoes.map(u => ({ v: u, l: u })),
        ]} />

        {pcs.some(p => p.abatido) && (
          <button onClick={() => setShowAbated(v => !v)} style={{
            ...btn.ghost,
            color: showAbated ? t.dangerText : t.textDim,
            borderColor: showAbated ? t.dangerBorder : t.border,
          }}>
            <Archive size={13} />
            {showAbated ? 'Ocultar abatidos' : `Abatidos (${pcs.filter(p => p.abatido).length})`}
          </button>
        )}
        {pcs.some(p => p.perdido) && (
          <button onClick={() => setShowPerdido(v => !v)} style={{
            ...btn.ghost,
            color: showPerdido ? t.warningText : t.textDim,
            borderColor: showPerdido ? t.warning : t.border,
          }}>
            <HelpCircle size={13} />
            {showPerdido ? 'Ocultar perdidos' : `Perdidos (${pcs.filter(p => p.perdido).length})`}
          </button>
        )}
        <button onClick={onShowLinks} style={btn.ghost} title="Gerar links de confirmação para enviar aos utilizadores">
          <Send size={13} /> Pedidos
        </button>
        <button onClick={onAdd} style={btn.primary}>
          <Plus size={14} /> Novo PC
        </button>
      </div>

      <div style={{
        fontSize: 11, color: t.textDim, fontFamily: 'JetBrains Mono, monospace',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <span>{filtered.length} de {pcs.filter(p => showAbated || !p.abatido).length} equipamentos</span>
      </div>

      <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, overflow: 'hidden', boxShadow: t.shadow }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: t.bgPanelAlt }}>
                <SortHeader col="rank" label="#" />
                <SortHeader col="pc" label="PC" />
                <SortHeader col="utilizador" label="Utilizador" />
                <SortHeader col="funcao" label="Função" />
                <SortHeader col="ano" label="Ano/Idade" />
                <SortHeader col="cpuClean" label="CPU" />
                <SortHeader col="cpuScore" label="CPU Score" align="right" />
                <SortHeader col="memMB" label="RAM" align="right" />
                <SortHeader col="gpuClean" label="GPU" />
                <SortHeader col="gpuScore" label="GPU Score" align="right" />
                <SortHeader col="totalScore" label="Total" align="right" />
                <SortHeader col="estado" label="Estado" />
                <SortHeader col="disponibilidade" label="Disponib." />
                <SortHeader col="lastReview" label="Confirmação" />
                <th style={{ padding: '12px 10px', borderBottom: `1px solid ${t.border}`, width: 110 }}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => {
                const tier = classifyTotal(p.totalScore || 0, thresholds, t);
                const rt = reviewTier(p.lastReview, t);
                return (
                  <tr key={p.pc} style={{ borderBottom: `1px solid ${t.bgHover}`, transition: 'background 0.1s', opacity: (p.abatido || p.perdido) ? 0.55 : 1 }}
                    onMouseEnter={e => e.currentTarget.style.background = t.bgPanelAlt}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <td style={tdMono}>
                      <span style={{
                        color: p.rank <= 10 ? t.accent : t.textDim,
                        fontWeight: p.rank <= 10 ? 700 : 500,
                      }}>{p.rank || '—'}</span>
                    </td>
                    <td style={{ ...tdMono, color: t.text, fontWeight: 600 }}>
                      {p.pc}
                      {p.abatido && (
                        <span style={{
                          marginLeft: 6, fontSize: 9, padding: '1px 5px', borderRadius: 3,
                          background: t.dangerBg, color: t.dangerText,
                          fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.06em',
                          textTransform: 'uppercase', verticalAlign: 'middle',
                        }}>ABATIDO</span>
                      )}
                      {p.perdido && (
                        <span style={{
                          marginLeft: 6, fontSize: 9, padding: '1px 5px', borderRadius: 3,
                          background: t.warning + '22', color: t.warningText,
                          fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.06em',
                          textTransform: 'uppercase', verticalAlign: 'middle',
                          border: `1px solid ${t.warning}44`,
                        }}>PERDIDO</span>
                      )}
                      {p.notas && (
                        <span title={p.notas} style={{
                          marginLeft: 4, fontSize: 10, color: t.textFaint,
                          cursor: 'default',
                        }}>📝</span>
                      )}
                    </td>
                    <td style={td}>{(p.utilizador || '').replace('INEGI\\', '') || '—'}</td>
                    <td style={td}>
                      <span style={{
                        padding: '2px 8px', borderRadius: 4, fontSize: 10,
                        background: t.chipBg, color: t.chipText, fontWeight: 600,
                        fontFamily: 'JetBrains Mono, monospace',
                      }}>{p.funcao || '—'}</span>
                    </td>
                    <td style={tdMono}>
                      {(() => {
                        const age = computerAge(p.ano, p.idadeAnos);
                        if (!p.ano && !p.idadeAnos) return <span style={{ color: t.textFaint }}>—</span>;
                        const ageColor = age >= 7 ? t.dangerText : age >= 5 ? t.warningText : t.textSecondary;
                        return (
                          <div style={{ display: 'flex', flexDirection: 'column', gap: 1, lineHeight: 1.2 }}>
                            {p.ano && <span style={{ color: t.textSecondary, fontWeight: 600 }}>{p.ano}</span>}
                            {age !== null && (
                              <span style={{ fontSize: 10, color: ageColor, fontFamily: 'Inter, sans-serif' }}>
                                {age} ano{age === 1 ? '' : 's'}
                              </span>
                            )}
                          </div>
                        );
                      })()}
                    </td>
                    <td style={tdMono}>{p.cpuClean || '—'}</td>
                    <td style={{ ...tdMono, textAlign: 'right', color: t.textSecondary }}>{fmt(p.cpuScore)}</td>
                    <td style={{ ...tdMono, textAlign: 'right' }}>{fmtMem(p.memMB)}</td>
                    <td style={tdMono}>{(p.gpuClean || '—').slice(0, 32)}</td>
                    <td style={{ ...tdMono, textAlign: 'right', color: t.textSecondary }}>{fmt(p.gpuScore)}</td>
                    <td style={{ ...tdMono, textAlign: 'right', color: tier.color, fontWeight: 700 }}>{fmt(p.totalScore)}</td>
                    <td style={td}><Pill tier={tier} small /></td>
                    <td style={td}>
                      {(() => {
                        const d = p.disponibilidade || 'outro';
                        const dc = DISPONIBILIDADE_COLORS(t)[d];
                        return (
                          <span style={{
                            display: 'inline-flex', alignItems: 'center', gap: 5,
                            padding: '2px 7px', borderRadius: 3, fontSize: 10,
                            background: dc.color + '20', color: dc.color,
                            border: `1px solid ${dc.color}40`, fontWeight: 700,
                            fontFamily: 'JetBrains Mono, monospace',
                            textTransform: 'uppercase', letterSpacing: '0.04em',
                          }}>
                            <span style={{ width: 5, height: 5, borderRadius: '50%', background: dc.dot }} />
                            {DISPONIBILIDADE_LABELS[d]}
                          </span>
                        );
                      })()}
                    </td>
                    <td style={td}>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                        <span style={{
                          display: 'inline-flex', alignItems: 'center', gap: 5,
                          fontSize: 11, color: rt.color,
                          fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
                        }}>
                          <span style={{ width: 5, height: 5, borderRadius: '50%', background: rt.dot }} />
                          {p.lastReview || '—'}
                        </span>
                        <span style={{ fontSize: 10, color: t.textDim, fontFamily: 'Inter, sans-serif' }}>
                          {rt.days === null ? rt.label : `${rt.days}d · ${rt.label}`}
                        </span>
                      </div>
                    </td>
                    <td style={{ padding: '8px 10px' }}>
                      <InventoryRowActions p={p} onConfirm={onConfirm} onEdit={onEdit} onDelete={onDelete} onAbate={onAbate} onRestore={onRestore} onMarkLost={onMarkLost} onRestoreLost={onRestoreLost} />
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan={15} style={{ padding: 40, textAlign: 'center', color: t.textDim }}>
                  Nenhum equipamento corresponde aos filtros.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

const EditModal = ({ pc, onSave, onClose, isNew, existingPcs }) => {
  const t = useTheme();
  const thresholds = useThresholdsCtx();
  const { allLabels: funcaoLabels, isCustom: isCustomFuncao, addFunction, removeFunction } = useFunctions();
  const btn = useButtonStyles();
  const [form, setForm] = useState(pc || {
    pc: '', utilizador: '', funcao: 'ENG', ubicacao: 'LUGAR',
    estado: 'ACCEPTABLE', unidade: 'UMEC',
    disponibilidade: 'ocupado',
    ano: '', idadeAnos: '',
    cpu: '', cpuClean: '', cpuScore: 0,
    memMB: 0, gpu: '', gpuClean: '', gpuScore: 0,
    disks: '', so: 'Microsoft Windows 11 Enterprise2009', ultComunic: '', lastReview: '',
    notas: '',
  });
  const [lookupResult, setLookupResult] = useState({ cpu: null, gpu: null });
  // New-function inline form
  const [showNewFuncao, setShowNewFuncao] = useState(false);
  const [newFuncaoCode, setNewFuncaoCode] = useState('');
  const [newFuncaoLabel, setNewFuncaoLabel] = useState('');
  const [newFuncaoError, setNewFuncaoError] = useState(null);

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Sentinel value for the dropdown's "Add new" option
  const handleFuncaoChange = (val) => {
    if (val === '__NEW__') {
      setShowNewFuncao(true);
      setNewFuncaoCode('');
      setNewFuncaoLabel('');
      setNewFuncaoError(null);
    } else {
      update('funcao', val);
    }
  };

  const handleAddFuncao = async () => {
    setNewFuncaoError(null);
    const result = await addFunction(newFuncaoCode, newFuncaoLabel);
    if (!result.ok) {
      setNewFuncaoError(result.error);
      return;
    }
    update('funcao', newFuncaoCode.trim());
    setShowNewFuncao(false);
    setNewFuncaoCode('');
    setNewFuncaoLabel('');
  };

  const handleRemoveFuncao = async () => {
    if (!isCustomFuncao(form.funcao)) return;
    if (!confirm(`Remover a função "${form.funcao}"? PCs com esta função vão manter o código, mas a entrada deixa de aparecer no dropdown.`)) return;
    const code = form.funcao;
    await removeFunction(code);
    update('funcao', 'ENG');
  };

  const doLookup = (kind) => {
    const modelField = kind === 'cpu' ? 'cpuClean' : 'gpuClean';
    const fallbackField = kind === 'cpu' ? 'cpu' : 'gpu';
    const scoreField = kind === 'cpu' ? 'cpuScore' : 'gpuScore';
    const modelName = (form[modelField] || form[fallbackField] || '').trim();
    if (!modelName) {
      setLookupResult(s => ({ ...s, [kind]: { error: `Preencha o ${kind === 'cpu' ? 'modelo do CPU' : 'modelo da GPU'} primeiro` } }));
      return;
    }
    const result = lookupBenchmarkLocal(kind, modelName);
    if (result && result.score > 0) {
      update(scoreField, Math.round(result.score));
      setLookupResult(s => ({ ...s, [kind]: {
        ok: true,
        score: Math.round(result.score),
        matched: result.matched,
        method: result.method,
      } }));
    } else {
      // Not in local DB — surface the PassMark fallback
      setLookupResult(s => ({ ...s, [kind]: {
        notFound: true,
        modelName,
        url: passmarkSearchUrl(kind, modelName),
      } }));
    }
  };

  const openPassmark = (kind, modelName) => {
    window.open(passmarkSearchUrl(kind, modelName), '_blank', 'noopener,noreferrer');
  };

  const handleSave = () => {
    const trimmed = form.pc.trim();
    if (!trimmed) { alert('O nome do PC é obrigatório.'); return; }
    // On edit (not new), if the name changed, check it doesn't collide with another PC
    if (!isNew && pc && trimmed !== pc.pc && existingPcs && existingPcs.some(p => p.pc === trimmed)) {
      alert(`Já existe um PC com o nome "${trimmed}". Escolha outro nome.`);
      return;
    }
    // On new, check the name is not already taken
    if (isNew && existingPcs && existingPcs.some(p => p.pc === trimmed)) {
      alert(`Já existe um PC com o nome "${trimmed}". Escolha outro nome.`);
      return;
    }
    onSave({
      ...form,
      pc: trimmed,
      cpuScore: Number(form.cpuScore) || 0,
      gpuScore: Number(form.gpuScore) || 0,
      memMB: Number(form.memMB) || 0,
      ano: form.ano ? Number(form.ano) : '',
      idadeAnos: form.idadeAnos ? Number(form.idadeAnos) : '',
    }, !isNew && pc ? pc.pc : null);  // pass original name for renames
  };

  const inputStyle = {
    width: '100%', padding: '9px 12px', background: t.bgPanel,
    border: `1px solid ${t.border}`, borderRadius: 6, color: t.text,
    fontSize: 13, outline: 'none', boxSizing: 'border-box',
  };
  const inputMono = { ...inputStyle, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: t.overlayBg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, padding: 20, backdropFilter: 'blur(4px)',
    }}>
      <div style={{
        background: t.bgPanel, border: `1px solid ${t.border}`,
        borderRadius: 10, width: '100%', maxWidth: 720,
        maxHeight: '90vh', overflow: 'auto', boxShadow: t.shadow,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', padding: '18px 22px',
          borderBottom: `1px solid ${t.border}`,
          position: 'sticky', top: 0, background: t.bgPanel, zIndex: 1,
        }}>
          <div>
            <div style={{
              fontSize: 10, color: t.accent, textTransform: 'uppercase',
              letterSpacing: '0.12em', fontFamily: 'JetBrains Mono, monospace',
              marginBottom: 4,
            }}>{isNew ? 'Novo equipamento' : 'Editar equipamento'}</div>
            <div style={{ fontSize: 18, color: t.text, fontWeight: 600 }}>
              {form.pc || 'Sem nome'}
            </div>
          </div>
          <IconBtn onClick={onClose} title="Fechar"><X size={16} /></IconBtn>
        </div>

        {form.abatido && (
          <div style={{
            margin: '0 22px', marginTop: 12, padding: '10px 14px',
            background: t.dangerBg, border: `1px solid ${t.dangerBorder}`,
            borderRadius: 6, fontSize: 12, color: t.dangerText,
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <Archive size={14} />
            <span>Este equipamento está <strong>abatido</strong>.</span>
            <button
              type="button"
              onClick={() => update('abatido', false)}
              style={{
                marginLeft: 'auto', padding: '4px 10px', borderRadius: 4,
                border: `1px solid ${t.dangerBorder}`, background: 'transparent',
                color: t.dangerText, cursor: 'pointer', fontSize: 11,
              }}>Restaurar</button>
          </div>
        )}
        {form.perdido && (
          <div style={{
            margin: '0 22px', marginTop: 12, padding: '10px 14px',
            background: t.warning + '18', border: `1px solid ${t.warning}44`,
            borderRadius: 6, fontSize: 12, color: t.warningText,
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <HelpCircle size={14} />
            <span>Este equipamento está classificado como <strong>perdido</strong>.</span>
            <button
              type="button"
              onClick={() => update('perdido', false)}
              style={{
                marginLeft: 'auto', padding: '4px 10px', borderRadius: 4,
                border: `1px solid ${t.warning}66`, background: 'transparent',
                color: t.warningText, cursor: 'pointer', fontSize: 11,
              }}>Restaurar</button>
          </div>
        )}

        <div style={{ padding: 22, display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14 }}>
          <ModalField label="Nome do PC *">
            <input value={form.pc} onChange={e => update('pc', e.target.value)} style={inputMono} />
            {!isNew && pc && form.pc !== pc.pc && (
              <div style={{
                marginTop: 4, fontSize: 10, color: t.warningText,
                fontFamily: 'JetBrains Mono, monospace',
              }}>
                ⚠ Renomear: {pc.pc} → {form.pc || '?'}
              </div>
            )}
          </ModalField>
          <ModalField label="Utilizador">
            <input value={form.utilizador} onChange={e => update('utilizador', e.target.value)} style={inputStyle} placeholder="INEGI\username" />

// ===== Replacement planning =====
const Planning = ({ pcs, onMarkTBR, onEdit }) => {
  const t = useTheme();
  const thresholds = useThresholdsCtx();
  const btn = useButtonStyles();
  const [costPerPC, setCostPerPC] = useState(2500);
  const [budget, setBudget] = useState(20000);
  const [includeStale, setIncludeStale] = useState(true);
  const [selected, setSelected] = useState(new Set());

  const candidates = useMemo(() => {
    const now = Date.now();
    return pcs
      .map(p => {
        const tier = classifyTotal(p.totalScore || 0, thresholds, t);
        let priority = 0;
        let reasons = [];
        if (tier.key === 'obsolete') { priority += 100; reasons.push('Obsoleto'); }
        if (tier.key === 'limited')  { priority += 60;  reasons.push('Limitado'); }
        if (p.estado === 'TBR')      { priority += 80;  reasons.push('Marcado TBR'); }
        if ((p.so || '').includes('Windows 7')) { priority += 40; reasons.push('Win 7 EOL'); }
        else if ((p.so || '').includes('Windows 10')) { priority += 10; reasons.push('Win 10'); }
        if (includeStale && p.ultComunic) {
          const d = new Date(p.ultComunic.replace(' ', 'T'));
          const days = (now - d.getTime()) / (24 * 60 * 60 * 1000);
          if (days > 90) { priority += 20; reasons.push(`Sem com. ${Math.round(days)}d`); }
        }
        return { ...p, priority, reasons, tier };
      })
      .filter(p => p.priority > 0)
      .sort((a, b) => b.priority - a.priority);
  }, [pcs, includeStale, t, thresholds]);

  const totalSelectedCost = selected.size * costPerPC;
  const withinBudget = totalSelectedCost <= budget;

  const toggleSelect = (pcName) => {
    const next = new Set(selected);
    if (next.has(pcName)) next.delete(pcName); else next.add(pcName);
    setSelected(next);
  };

  const selectTopByBudget = () => {
    const maxN = Math.floor(budget / costPerPC);
    setSelected(new Set(candidates.slice(0, maxN).map(c => c.pc)));
  };

  const lblSmall = {
    fontSize: 10, color: t.textDim, textTransform: 'uppercase',
    letterSpacing: '0.08em', fontFamily: 'JetBrains Mono, monospace',
    display: 'block', marginBottom: 6,
  };
  const planInput = {
    width: '100%', padding: '9px 12px', background: t.bgPanelAlt,
    border: `1px solid ${t.border}`, borderRadius: 6, color: t.text,
    fontSize: 14, fontFamily: 'JetBrains Mono, monospace',
    outline: 'none', boxSizing: 'border-box', fontWeight: 600,
  };
  const thPlan = {
    padding: '12px 10px', textAlign: 'left', fontSize: 10,
    color: t.textDim, textTransform: 'uppercase', letterSpacing: '0.1em',
    fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
    borderBottom: `1px solid ${t.border}`, whiteSpace: 'nowrap',
  };
  const td = { padding: '11px 10px', color: t.textSecondary, verticalAlign: 'middle' };
  const tdMono = { ...td, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, padding: 18, boxShadow: t.shadow }}>
        <div style={{
          fontSize: 11, color: t.textDim, letterSpacing: '0.12em',
          textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace',
          marginBottom: 14,
        }}>Parâmetros do plano</div>
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 14,
          alignItems: 'end',
        }}>
          <div>
            <label style={lblSmall}>Custo por PC (€)</label>
            <input type="number" value={costPerPC}
              onChange={e => setCostPerPC(Number(e.target.value) || 0)} style={planInput} />
          </div>
          <div>
            <label style={lblSmall}>Orçamento total (€)</label>
            <input type="number" value={budget}
              onChange={e => setBudget(Number(e.target.value) || 0)} style={planInput} />
          </div>
          <div style={{ background: t.bgPanelAlt, padding: 12, borderRadius: 6, border: `1px solid ${t.border}` }}>
            <div style={lblSmall}>Capacidade do orçamento</div>
            <div style={{ fontSize: 22, color: t.accent, fontWeight: 700, fontFamily: 'JetBrains Mono, monospace' }}>
              {Math.floor(budget / costPerPC)} PCs
            </div>
          </div>
          <label style={{
            display: 'flex', alignItems: 'center', gap: 8,
            color: t.textSecondary, fontSize: 12, cursor: 'pointer',
          }}>
            <input type="checkbox" checked={includeStale}
              onChange={e => setIncludeStale(e.target.checked)} />
            Incluir PCs sem comunicação &gt; 90 dias
          </label>
          <button onClick={selectTopByBudget} style={btn.primary}>
            <ListChecks size={14} /> Selecionar topo do orçamento
          </button>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12 }}>
        <Stat label="Candidatos" value={candidates.length} sub="Equipamentos a substituir" accent={t.warning} icon={AlertTriangle} />
        <Stat label="Selecionados" value={selected.size} sub={`de ${candidates.length} candidatos`} accent={t.accent} icon={CheckCircle2} />
        <Stat label="Custo Total" value={`€${totalSelectedCost.toLocaleString('pt-PT')}`}
          sub={`de €${budget.toLocaleString('pt-PT')}`}
          accent={withinBudget ? t.success : t.danger}
          icon={withinBudget ? CheckCircle2 : AlertTriangle} />
        <Stat label="Margem" value={`€${(budget - totalSelectedCost).toLocaleString('pt-PT')}`}
          sub={withinBudget ? 'Dentro do orçamento' : 'Excede orçamento'}
          accent={withinBudget ? t.success : t.danger} />
      </div>

      <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, overflow: 'hidden', boxShadow: t.shadow }}>
        <div style={{
          padding: '14px 18px', borderBottom: `1px solid ${t.border}`,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <div style={{
            fontSize: 11, color: t.textDim, letterSpacing: '0.12em',
            textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace',
          }}>Lista de candidatos a substituição</div>
          <div style={{ fontSize: 11, color: t.textDim, fontFamily: 'JetBrains Mono, monospace' }}>
            Ordenado por prioridade ↓
          </div>
        </div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: t.bgPanelAlt }}>
                <th style={{ ...thPlan, width: 40 }}></th>
                <th style={thPlan}>Prioridade</th>
                <th style={thPlan}>PC</th>
                <th style={thPlan}>Utilizador</th>
                <th style={thPlan}>Função</th>
                <th style={thPlan}>Hardware</th>
                <th style={{ ...thPlan, textAlign: 'right' }}>Score</th>
                <th style={thPlan}>Nível</th>
                <th style={thPlan}>Razões</th>
                <th style={{ ...thPlan, width: 100 }}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {candidates.map(p => {
                const isSel = selected.has(p.pc);
                return (
                  <tr key={p.pc} style={{
                    borderBottom: `1px solid ${t.bgHover}`,
                    background: isSel ? t.selectedBg : 'transparent',
                  }}>
                    <td style={td}>
                      <button onClick={() => toggleSelect(p.pc)} style={{
                        background: 'transparent', border: 'none', cursor: 'pointer',
                        color: isSel ? t.accent : t.textFaint, display: 'flex', padding: 4,
                      }}>
                        {isSel ? <CheckCircle2 size={18} /> : <Circle size={18} />}
                      </button>
                    </td>
                    <td style={tdMono}>
                      <div style={{
                        display: 'inline-block', padding: '3px 8px', borderRadius: 4,
                        background: p.priority >= 100 ? t.danger + '20' : p.priority >= 60 ? t.warning + '20' : t.chipBg,
                        color: p.priority >= 100 ? t.dangerText : p.priority >= 60 ? t.warningText : t.textMuted,
                        fontWeight: 700, fontSize: 11,
                      }}>{p.priority}</div>
                    </td>
                    <td style={{ ...tdMono, color: t.text, fontWeight: 600 }}>{p.pc}</td>
                    <td style={td}>{(p.utilizador || '').replace('INEGI\\', '') || '—'}</td>
                    <td style={tdMono}>{p.funcao || '—'}</td>
                    <td style={{ ...tdMono, fontSize: 11, color: t.textMuted }}>
                      {p.cpuClean || '—'} · {fmtMem(p.memMB)}
                    </td>
                    <td style={{ ...tdMono, textAlign: 'right', color: p.tier.color, fontWeight: 700 }}>
                      {fmt(p.totalScore)}
                    </td>
                    <td style={td}><Pill tier={p.tier} small /></td>
                    <td style={td}>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                        {p.reasons.map((r, i) => (
                          <span key={i} style={{
                            padding: '2px 6px', borderRadius: 3, fontSize: 10,
                            background: t.chipBg, color: t.textSecondary,
                            fontFamily: 'JetBrains Mono, monospace',
                          }}>{r}</span>
                        ))}
                      </div>
                    </td>
                    <td style={td}>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <IconBtn onClick={() => onMarkTBR(p)} title="Marcar TBR"><Tag size={12} /></IconBtn>
                        <IconBtn onClick={() => onEdit(p)} title="Editar"><Edit3 size={12} /></IconBtn>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {candidates.length === 0 && (
                <tr><td colSpan={10} style={{ padding: 40, textAlign: 'center', color: t.success }}>
                  ✓ Nenhum candidato identificado. Parque informático em bom estado.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};
