  const btn = useButtonStyles();
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [completenessFilter, setCompletenessFilter] = useState('all');
  const [sortBy, setSortBy] = useState('utilizador');
  const [sortDir, setSortDir] = useState('asc');

  // Has the user got any peripheral with the given status?
  const hasStatus = (rec, status) => {
    if (rec.monitor1Present && rec.monitor1Status === status) return true;
    if (rec.monitor2Present && rec.monitor2Status === status) return true;
    for (const { key } of SINGLE_PERIPHERALS) {
      if (rec[key + 'Present'] && rec[key + 'Status'] === status) return true;
    }
    return false;
  };

  // Count peripherals attributed to a row (out of TOTAL_SLOTS total slots)
  const TOTAL_SLOTS = 2 + SINGLE_PERIPHERALS.length;  // 2 monitors + 6 single = 8
  const presentCount = (rec) => {
    let n = 0;
    if (rec.monitor1Present) n++;
    if (rec.monitor2Present) n++;
    for (const { key } of SINGLE_PERIPHERALS) {
      if (rec[key + 'Present']) n++;
    }
    return n;
  };

  const filtered = useMemo(() => {
    let result = items.filter(rec => {
      if (search) {
        const s = search.toLowerCase();
        const allText = [
          rec.utilizador, rec.notes,
          rec.monitor1Brand, rec.monitor2Brand,
          ...SINGLE_PERIPHERALS.map(({ key }) => rec[key + 'Brand'] || ''),
        ].join(' ').toLowerCase();
        if (!allText.includes(s)) return false;
      }
      if (statusFilter !== 'all' && !hasStatus(rec, statusFilter)) return false;
      if (completenessFilter === 'complete' && presentCount(rec) < TOTAL_SLOTS) return false;
      if (completenessFilter === 'incomplete' && presentCount(rec) === TOTAL_SLOTS) return false;
      return true;
    });
    result.sort((a, b) => {
      let av = a[sortBy], bv = b[sortBy];
      if (sortBy === 'count') { av = presentCount(a); bv = presentCount(b); }
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av == null) av = '';
      if (bv == null) bv = '';
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return result;
  }, [items, search, statusFilter, completenessFilter, sortBy, sortDir]);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('asc'); }
  };

  const td = { padding: '11px 10px', color: t.textSecondary, verticalAlign: 'top' };
  const tdMono = { ...td, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 };

  const SortHeader = ({ col, label, align = 'left' }) => (
    <th style={{
      padding: '12px 10px', textAlign: align, fontSize: 10,
      color: t.textDim, textTransform: 'uppercase', letterSpacing: '0.1em',
      fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
      borderBottom: `1px solid ${t.border}`, cursor: 'pointer', userSelect: 'none',
      whiteSpace: 'nowrap',
    }} onClick={() => toggleSort(col)}>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
        {label}
        {sortBy === col && (sortDir === 'asc' ? <ChevronUp size={11} /> : <ChevronDown size={11} />)}
        {sortBy !== col && <ArrowUpDown size={10} style={{ opacity: 0.3 }} />}
      </span>
    </th>
  );

  // Aggregate stats
  const stats = useMemo(() => {
    const totalUsers = items.length;
    const itemCounts = {};
    const slotKeys = ['monitor1', 'monitor2', ...SINGLE_PERIPHERALS.map(s => s.key)];
    for (const k of slotKeys) itemCounts[k] = 0;
    items.forEach(rec => {
      if (rec.monitor1Present) itemCounts.monitor1++;
      if (rec.monitor2Present) itemCounts.monitor2++;
      for (const { key } of SINGLE_PERIPHERALS) {
        if (rec[key + 'Present']) itemCounts[key]++;
      }
    });
    const tbrCount = items.filter(r => hasStatus(r, 'TBR')).length;
    return { totalUsers, itemCounts, tbrCount };
  }, [items]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Summary cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12 }}>
        <Stat label="Utilizadores" value={stats.totalUsers}
          sub="Registos de periféricos" accent={t.accent} icon={Monitor} />
        <Stat label="Monitores"
          value={stats.itemCounts.monitor1 + stats.itemCounts.monitor2}
          sub={`${stats.itemCounts.monitor1} primário · ${stats.itemCounts.monitor2} secundário`}
          accent={t.purple} icon={Monitor} />
        <Stat label="Periféricos atribuídos"
          value={SINGLE_PERIPHERALS.reduce((sum, s) => sum + stats.itemCounts[s.key], 0)}
          sub="Acessórios totais" accent={t.warning} icon={Tag} />
        <Stat label="A substituir (TBR)" value={stats.tbrCount}
          sub="Util. com 1+ periférico TBR"
          accent={stats.tbrCount > 0 ? t.danger : t.success} icon={AlertTriangle} />
      </div>

      {/* Filters */}
      <div style={{
        display: 'flex', flexWrap: 'wrap', gap: 10,
        background: t.bgPanel, padding: 14, borderRadius: 8,
        border: `1px solid ${t.border}`, boxShadow: t.shadow,
      }}>
        <div style={{ position: 'relative', flex: '1 1 240px', minWidth: 200 }}>
          <Search size={14} style={{
            position: 'absolute', left: 12, top: '50%',
            transform: 'translateY(-50%)', color: t.textDim,
          }} />
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Utilizador, marca, notas..."
            style={{
              width: '100%', padding: '9px 12px 9px 36px', background: t.bgPanelAlt,
              border: `1px solid ${t.border}`, borderRadius: 6, color: t.text,
              fontSize: 13, outline: 'none', boxSizing: 'border-box',
            }} />
        </div>

        <FilterSelect value={statusFilter} onChange={setStatusFilter} options={[
          { v: 'all', l: 'Todos os estados' },
          ...PERIPHERAL_STATUS.map(s => ({ v: s, l: `Tem ${s}` })),
        ]} />
        <FilterSelect value={completenessFilter} onChange={setCompletenessFilter} options={[
          { v: 'all', l: 'Completos + incompletos' },
          { v: 'complete', l: 'Apenas completos' },
          { v: 'incomplete', l: 'Apenas incompletos' },
        ]} />

        <button onClick={onAdd} style={btn.primary}>
          <Plus size={14} /> Novo registo
        </button>
      </div>

      <div style={{
        fontSize: 11, color: t.textDim, fontFamily: 'JetBrains Mono, monospace',
      }}>
        {filtered.length} de {items.length} registos
      </div>

      {/* Table */}
      <div style={{
        background: t.bgPanel, border: `1px solid ${t.border}`,
        borderRadius: 8, overflow: 'hidden', boxShadow: t.shadow,
      }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13, minWidth: 1200 }}>
            <thead>
              <tr style={{ background: t.bgPanelAlt }}>
                <SortHeader col="utilizador" label="Utilizador" />
                <SortHeader col="count" label="Periféricos" align="right" />
                <th style={{
                  padding: '12px 10px', textAlign: 'left', fontSize: 10,
                  color: t.textDim, textTransform: 'uppercase', letterSpacing: '0.1em',
                  fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
                  borderBottom: `1px solid ${t.border}`, whiteSpace: 'nowrap',
                }}>Monitor 1</th>
                <th style={{
                  padding: '12px 10px', textAlign: 'left', fontSize: 10,
                  color: t.textDim, textTransform: 'uppercase', letterSpacing: '0.1em',
                  fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
                  borderBottom: `1px solid ${t.border}`, whiteSpace: 'nowrap',
                }}>Monitor 2</th>
                {SINGLE_PERIPHERALS.map(({ key, label }) => (
                  <th key={key} style={{
                    padding: '12px 10px', textAlign: 'left', fontSize: 10,
                    color: t.textDim, textTransform: 'uppercase', letterSpacing: '0.1em',
                    fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
                    borderBottom: `1px solid ${t.border}`, whiteSpace: 'nowrap',
                  }}>{label}</th>
                ))}
                <th style={{
                  padding: '12px 10px', borderBottom: `1px solid ${t.border}`, width: 80,
                }}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(rec => {
                const count = presentCount(rec);
                return (
                  <tr key={rec.id} style={{ borderBottom: `1px solid ${t.bgHover}`, transition: 'background 0.1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = t.bgPanelAlt}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <td style={{ ...tdMono, color: t.text, fontWeight: 600 }}>
                      {(rec.utilizador || '').replace('INEGI\\', '') || '—'}
                      {rec.notes && (
                        <div style={{
                          fontSize: 10, color: t.textDim, marginTop: 3,
                          fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
                          maxWidth: 180, whiteSpace: 'nowrap', overflow: 'hidden',
                          textOverflow: 'ellipsis',
                        }} title={rec.notes}>{rec.notes}</div>
                      )}
                    </td>
                    <td style={{ ...tdMono, textAlign: 'right' }}>
                      <span style={{
                        padding: '2px 7px', borderRadius: 3, fontSize: 11,
                        background: count === TOTAL_SLOTS ? t.success + '20' : count <= 2 ? t.danger + '20' : t.warning + '20',
                        color: count === TOTAL_SLOTS ? t.successText : count <= 2 ? t.dangerText : t.warningText,
                        fontWeight: 700,
                      }}>{count}/{TOTAL_SLOTS}</span>
                    </td>
                    <td style={td}>
                      <PeripheralCell present={rec.monitor1Present} brand={rec.monitor1Brand}
                        size={rec.monitor1Size} status={rec.monitor1Status} />
                    </td>
                    <td style={td}>
                      <PeripheralCell present={rec.monitor2Present} brand={rec.monitor2Brand}
                        size={rec.monitor2Size} status={rec.monitor2Status} />
                    </td>
                    {SINGLE_PERIPHERALS.map((item) => (
                      <td key={item.key} style={td}>
                        <PeripheralCell
                          present={rec[item.key + 'Present']}
                          brand={rec[item.key + 'Brand']}
                          status={rec[item.key + 'Status']}
                          personal={item.canBePersonal && rec[item.key + 'Personal']}
                          type={item.type}
                        />
                      </td>
                    ))}
                    <td style={{ padding: '8px 10px' }}>
                      <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
                        <IconBtn onClick={() => onEdit(rec)} title="Editar"><Edit3 size={13} /></IconBtn>
                        <IconBtn onClick={() => onDelete(rec)} title="Eliminar" danger><Trash2 size={13} /></IconBtn>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan={11} style={{ padding: 40, textAlign: 'center', color: t.textDim }}>
                  {items.length === 0
                    ? 'Ainda não há registos de periféricos. Clica em "Novo registo" para começar.'
                    : 'Nenhum registo corresponde aos filtros.'}
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ===== Backup / restore modal =====
const BACKUP_SCHEMA_VERSION = 1;
const APP_VERSION_TAG = 'INEGI UMEC Equipment Manager v1.10';

const validateBackup = (obj) => {
  if (!obj || typeof obj !== 'object') return { ok: false, error: 'Ficheiro vazio ou inválido.' };
  if (typeof obj.schemaVersion !== 'number') return { ok: false, error: 'Falta o campo schemaVersion.' };
  if (obj.schemaVersion > BACKUP_SCHEMA_VERSION) {
    return { ok: false, error: `Versão do esquema ${obj.schemaVersion} mais recente do que esta app suporta (${BACKUP_SCHEMA_VERSION}). Atualize a aplicação.` };
  }
  if (!obj.data || typeof obj.data !== 'object') return { ok: false, error: 'Falta o objeto "data".' };
  const { pcs, peripherals, thresholds } = obj.data;
  if (!Array.isArray(pcs)) return { ok: false, error: 'Campo "pcs" tem de ser uma lista.' };
  if (!Array.isArray(peripherals)) return { ok: false, error: 'Campo "peripherals" tem de ser uma lista.' };
  if (thresholds && !validateThresholds(thresholds)) {
    return { ok: false, error: 'Campo "thresholds" inválido (ordem ou valores).' };
  }
  // Spot-check pcs structure: each row must have at least a "pc" string
  for (let i = 0; i < pcs.length; i++) {
    if (!pcs[i] || typeof pcs[i].pc !== 'string') {
      return { ok: false, error: `PC #${i + 1} inválido — falta o campo "pc".` };
    }
  }
  for (let i = 0; i < peripherals.length; i++) {
    if (!peripherals[i] || typeof peripherals[i].id !== 'string') {
      return { ok: false, error: `Registo de periféricos #${i + 1} inválido — falta o campo "id".` };
    }
  }
  return { ok: true };
};

const BackupModal = ({ pcs, peripherals, thresholds, customFunctions, onImport, onClose }) => {
  const t = useTheme();
  const btn = useButtonStyles();
  const fileInputRef = useRef(null);
  const [parsed, setParsed] = useState(null);   // { meta, data } when a valid file is loaded
  const [error, setError] = useState(null);
  const [filename, setFilename] = useState(null);
  const [importing, setImporting] = useState(false);

  const buildBackup = () => ({
    schemaVersion: BACKUP_SCHEMA_VERSION,
    exportedAt: new Date().toISOString(),
    exportedBy: APP_VERSION_TAG,
    counts: { pcs: pcs.length, peripherals: peripherals.length },
    data: { pcs, peripherals, thresholds, customFunctions },
  });

  const handleExport = () => {
    const backup = buildBackup();
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = todayISO();
    a.href = url;
    a.download = `inegi_umec_backup_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleFileSelect = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setFilename(file.name);
    setError(null);
    setParsed(null);
    try {
      const text = await file.text();
      let obj;
      try {
        obj = JSON.parse(text);
      } catch {
        setError('Ficheiro não é JSON válido.');
        return;
      }
      const v = validateBackup(obj);
      if (!v.ok) { setError(v.error); return; }
      setParsed(obj);
    } catch (err) {
      setError('Não foi possível ler o ficheiro: ' + err.message);
    }
  };

  const handleImport = async () => {
    if (!parsed) return;
    setImporting(true);
    try {
      await onImport(parsed.data);
      // onImport closes the modal
    } catch (err) {
      setError('Erro ao importar: ' + (err.message || err));
      setImporting(false);
    }
  };

  const Section = ({ title, children }) => (
    <div style={{
      background: t.bgPanelAlt, border: `1px solid ${t.border}`,
      borderRadius: 8, padding: 16, marginBottom: 14,

        fontSize: 11, color: t.accent, letterSpacing: '0.12em',
        textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace',

        marginBottom: 3,
      }}>{label}</div>
      <div style={{
        fontSize: 18, color: t.text, fontWeight: 700,
        fontFamily: 'JetBrains Mono, monospace',
      }}>{value}</div>
    </div>
  );

  // Compute import-vs-current diff for confirmation
  const diff = useMemo(() => {
    if (!parsed) return null;
    const inPcs = parsed.data.pcs.length;
    const inPeriph = parsed.data.peripherals.length;
    return {
      inPcs, inPeriph,
      curPcs: pcs.length, curPeriph: peripherals.length,
      pcsDelta: inPcs - pcs.length,
      periphDelta: inPeriph - peripherals.length,
      hasThresholds: !!parsed.data.thresholds,
      exportedAt: parsed.exportedAt,
      exportedBy: parsed.exportedBy,
    };
  }, [parsed, pcs, peripherals]);

  return (
    <div style={{
      position: 'fixed', inset: 0, background: t.overlayBg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, padding: 20, backdropFilter: 'blur(4px)',
    }}>
      <div style={{
        background: t.bgPanel, border: `1px solid ${t.border}`,
        borderRadius: 10, width: '100%', maxWidth: 640,
        maxHeight: '90vh', overflow: 'auto', boxShadow: t.shadow,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', padding: '18px 22px',
          borderBottom: `1px solid ${t.border}`,
          position: 'sticky', top: 0, background: t.bgPanel, zIndex: 1,
        }}>
          <div>
            <div style={{
              fontSize: 10, color: t.accent, textTransform: 'uppercase',
              letterSpacing: '0.12em', fontFamily: 'JetBrains Mono, monospace',
              marginBottom: 4,
            }}>Backup partilhado</div>
            <div style={{ fontSize: 18, color: t.text, fontWeight: 600 }}>
              Gravar / Carregar dados
            </div>
          </div>
          <IconBtn onClick={onClose} title="Fechar"><X size={16} /></IconBtn>
        </div>

        <div style={{ padding: 22 }}>
          <div style={{
            padding: 12, background: t.bgPanelAlt, borderRadius: 6,
            border: `1px solid ${t.border}`, marginBottom: 18,
            fontSize: 11, color: t.textMuted, lineHeight: 1.6,
          }}>
            Esta ferramenta cria um <strong style={{ color: t.text }}>ficheiro JSON único</strong> com
            todo o estado da aplicação (PCs, periféricos, critérios). Partilha o ficheiro
            com a equipa por email, drive partilhado ou Slack, e qualquer pessoa pode
            carregá-lo aqui para garantir que está a trabalhar com a versão mais recente.
          </div>

          <Section title="Gravar dados (exportar)">
            <div style={{
              display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)',
              gap: 12, marginBottom: 14,
            }}>
              <Stat2 label="PCs" value={pcs.length} />
              <Stat2 label="Periféricos" value={peripherals.length} />
            </div>
            <button onClick={handleExport} style={{ ...btn.primary, width: '100%', justifyContent: 'center' }}>
              <Download size={14} /> Gravar backup completo (.json)

            <div style={{

                  <div style={{

const ThresholdsModal = ({ pcs, onSave, onReset, onClose }) => {
  const t = useTheme();
  const currentThresholds = useThresholdsCtx();
  const btn = useButtonStyles();
  const [draft, setDraft] = useState(currentThresholds);
  const [error, setError] = useState(null);

  const update = (kind, key, value) => {
    setDraft(d => ({
      ...d,
      [kind]: { ...d[kind], [key]: Number(value) || 0 }
    }));
    setError(null);
  };

  // Live preview: count PCs in each tier under draft thresholds
  const preview = useMemo(() => {
    const result = { total: {}, cpu: {}, gpu: {} };
    for (const kind of ['total', 'cpu', 'gpu']) {
      result[kind] = { excellent: 0, functional: 0, limited: 0, obsolete: 0 };
      for (const p of pcs) {
        const score = kind === 'total' ? (p.totalScore || 0)
          : kind === 'cpu' ? (p.cpuScore || 0) : (p.gpuScore || 0);
        const tier = classify(score, kind, draft, t);
        result[kind][tier.key]++;
      }
    }
    return result;
  }, [pcs, draft, t]);

  const handleSave = () => {
    const validated = validateThresholds(draft);
    if (!validated) {
      setError('Os thresholds devem respeitar a ordem: Performance > Funcional > Limitado > 0');
      return;
    }
    onSave(validated);
  };

  const handleReset = async () => {
    await onReset();
    setDraft(DEFAULT_THRESHOLDS);
    setError(null);
  };

  const isDirty = JSON.stringify(draft) !== JSON.stringify(currentThresholds);
  const draftValid = validateThresholds(draft) !== null;

  // Build list of tier rows for a given metric
  const tierRows = (kind) => {
    const tiers = TIERS_ORDER.map(k => buildTier(k, kind, draft, t));
    const counts = preview[kind];
    return { tiers, counts };
  };

  const inputStyle = {
    width: '100%', padding: '8px 10px', background: t.bgPanel,
    border: `1px solid ${t.border}`, borderRadius: 4, color: t.text,
    fontSize: 13, fontFamily: 'JetBrains Mono, monospace',
    outline: 'none', boxSizing: 'border-box', textAlign: 'right',
    fontWeight: 600,
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, background: t.overlayBg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, padding: 20, backdropFilter: 'blur(4px)',
    }}>
      <div style={{
        background: t.bgPanel, border: `1px solid ${t.border}`,
        borderRadius: 10, width: '100%', maxWidth: 720,
        maxHeight: '90vh', overflow: 'auto', boxShadow: t.shadow,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center', padding: '18px 22px',
          borderBottom: `1px solid ${t.border}`,
          position: 'sticky', top: 0, background: t.bgPanel, zIndex: 1,
        }}>
          <div>
            <div style={{
              fontSize: 10, color: t.accent, textTransform: 'uppercase',
              letterSpacing: '0.12em', fontFamily: 'JetBrains Mono, monospace',
              marginBottom: 4,
            }}>Critérios de Classificação</div>
            <div style={{ fontSize: 18, color: t.text, fontWeight: 600 }}>
              Thresholds PassMark
            </div>
          </div>
          <IconBtn onClick={onClose} title="Fechar"><X size={16} /></IconBtn>
        </div>

        <div style={{ padding: 22 }}>
          <div style={{
            padding: 12, background: t.bgPanelAlt, borderRadius: 6,
            border: `1px solid ${t.border}`, marginBottom: 18,
            fontSize: 11, color: t.textMuted, lineHeight: 1.6,
          }}>
            Define os limites mínimos de pontuação PassMark para cada nível de classificação.
            Os valores aplicam-se em tempo real a todo o inventário, dashboard e plano de substituição.
            A pré-visualização à direita mostra a distribuição atual de PCs.
          </div>

          <ThresholdsKindSection
            kind="total"
            title="Pontuação Total (CPU + GPU)"
            description="Critério principal usado em Dashboard, Inventário e Plano de Substituição."
            draft={draft} update={update} totalCount={pcs.length}
            tiers={tierRows('total').tiers} counts={tierRows('total').counts}
          />
          <ThresholdsKindSection
            kind="cpu"
            title="CPU (CPU Mark)"

            draft={draft} update={update} totalCount={pcs.length}
            tiers={tierRows('cpu').tiers} counts={tierRows('cpu').counts}
          />
          <ThresholdsKindSection
            kind="gpu"
            title="GPU (G3D Mark)"
            description="Threshold de referência para classificação isolada da GPU."
            draft={draft} update={update} totalCount={pcs.length}
            tiers={tierRows('gpu').tiers} counts={tierRows('gpu').counts}
          />

          {error && (
            <div style={{
              padding: '10px 14px', background: t.dangerBg, color: t.dangerText,

const Warehouse = ({ items, pcs, onAdd, onEdit, onDelete, onAssign, onReturn }) => {
  const t = useTheme();
  const btn = useButtonStyles();
  const [tipoFilter, setTipoFilter] = useState('all');
  const [estadoFilter, setEstadoFilter] = useState('all');
  const [stockFilter, setStockFilter] = useState('stock');
  const [search, setSearch] = useState('');
  const [assignItem, setAssignItem] = useState(null);
  const [assignPc, setAssignPc] = useState('');

  const filtered = useMemo(() => items.filter(item => {
    if (tipoFilter !== 'all' && item.tipo !== tipoFilter) return false;
    if (estadoFilter !== 'all' && item.estado !== estadoFilter) return false;
    if (stockFilter === 'stock' && item.atribuidoA) return false;
    if (stockFilter === 'assigned' && !item.atribuidoA) return false;
    if (search) {
      const q = search.toLowerCase();
      return (item.marca || '').toLowerCase().includes(q) ||
        (item.modelo || '').toLowerCase().includes(q) ||
        (item.notas || '').toLowerCase().includes(q) ||
        (item.atribuidoA || '').toLowerCase().includes(q);
    }
    return true;
  }), [items, tipoFilter, estadoFilter, stockFilter, search]);

  const stockCount = items.filter(i => !i.atribuidoA).length;
  const assignedCount = items.filter(i => !!i.atribuidoA).length;
  const tipoLabel = k => (WAREHOUSE_TIPOS.find(x => x.key === k) || { label: k }).label;
  const statusColors = PERIPHERAL_STATUS_COLORS(t);

  const handleConfirmAssign = () => {
    if (!assignPc) return;
    onAssign(assignItem, assignPc);
    setAssignItem(null);
    setAssignPc('');
  };

  const inp = {
    padding: '7px 10px', background: t.bgPanel, border: `1px solid ${t.border}`,
    borderRadius: 6, color: t.text, fontSize: 13, outline: 'none', boxSizing: 'border-box',
  };
  const thS = {
    padding: '10px 14px', textAlign: 'left', fontSize: 10, color: t.textDim,
    textTransform: 'uppercase', letterSpacing: '0.1em',
    fontFamily: 'JetBrains Mono, monospace', fontWeight: 600,
    borderBottom: `1px solid ${t.border}`, whiteSpace: 'nowrap',
  };
  const tdS = { padding: '10px 14px', borderBottom: `1px solid ${t.bgHover}`, fontSize: 13, verticalAlign: 'middle' };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 14 }}>
        <Stat label="Total Armazém" value={items.length} sub="itens registados" accent={t.accent} icon={Package} />
        <Stat label="Em Stock" value={stockCount} sub="disponíveis" accent={t.success} icon={PackageCheck} />
        <Stat label="Atribuídos" value={assignedCount} sub="em uso" accent={t.textDim} icon={UserCheck} />
      </div>

      <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, padding: 14, display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center' }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Pesquisar marca, modelo, PC…"
          style={{ ...inp, width: 220, flex: '0 0 auto' }} />
        <select value={tipoFilter} onChange={e => setTipoFilter(e.target.value)} style={{ ...inp, width: 150 }}>
          <option value="all">Todos os tipos</option>
          {WAREHOUSE_TIPOS.map(tp => <option key={tp.key} value={tp.key}>{tp.label}</option>)}
        </select>
        <select value={estadoFilter} onChange={e => setEstadoFilter(e.target.value)} style={{ ...inp, width: 140 }}>
          <option value="all">Todos os estados</option>
          {PERIPHERAL_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={stockFilter} onChange={e => setStockFilter(e.target.value)} style={{ ...inp, width: 160 }}>
          <option value="all">Stock + Atribuídos</option>
          <option value="stock">Apenas em stock</option>
          <option value="assigned">Apenas atribuídos</option>
        </select>
        <div style={{ flex: 1 }} />
        <button onClick={onAdd} style={{ ...btn.primary, display: 'flex', alignItems: 'center', gap: 6 }}>
          <Plus size={14} /> Novo Item
        </button>
      </div>

      <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 8, overflow: 'hidden' }}>
        {filtered.length === 0 ? (
          <div style={{ padding: 48, textAlign: 'center', color: t.textDim, fontSize: 13 }}>
            {items.length === 0
              ? 'Nenhum item no armazém. Clique em "Novo Item" para adicionar.'
              : 'Nenhum resultado para os filtros actuais.'}
          </div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ background: t.bgPanelAlt }}>
                  <th style={thS}>Tipo</th>
                  <th style={thS}>Marca / Modelo</th>
                  <th style={thS}>Estado</th>
                  <th style={thS}>Entrada</th>
                  <th style={thS}>Atribuído a</th>
                  <th style={thS}>Notas</th>
                  <th style={{ ...thS, textAlign: 'right' }}></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(item => {
                  const sc = statusColors[item.estado] || {};
                  return (
                    <tr key={item.id}
                      onMouseEnter={e => e.currentTarget.style.background = t.bgPanelAlt}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <td style={tdS}>
                        <span style={{ background: t.bgPanelAlt, border: `1px solid ${t.border}`, borderRadius: 4, padding: '2px 8px', fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: t.textMuted }}>
                          {tipoLabel(item.tipo)}{item.tamanho ? ` ${item.tamanho}"` : ''}
                        </span>
                      </td>
                      <td style={{ ...tdS, fontWeight: 500 }}>
                        {item.marca || '—'}
                        {item.modelo ? <span style={{ color: t.textDim, fontWeight: 400, marginLeft: 6 }}>{item.modelo}</span> : null}
                      </td>
                      <td style={tdS}>
                        <span style={{ color: sc.color || t.text, background: (sc.dot || t.accent) + '22', borderRadius: 4, padding: '2px 8px', fontSize: 11 }}>
                          {item.estado}
                        </span>
                      </td>
                      <td style={{ ...tdS, color: t.textDim, fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>
                        {item.dataEntrada || '—'}
                      </td>
                      <td style={tdS}>
                        {item.atribuidoA
                          ? <><span style={{ color: t.accent, fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>{item.atribuidoA}</span>
                              {item.atribuidoEm && <span style={{ color: t.textFaint, fontSize: 10, marginLeft: 6 }}>{item.atribuidoEm}</span>}</>
                          : <span style={{ color: t.success, fontSize: 11 }}>&#9679; Em stock</span>
                        }
                      </td>
                      <td style={{ ...tdS, color: t.textDim, maxWidth: 200 }}>
                        <span style={{ display: 'block', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 180 }}>
                          {item.notas || ''}
                        </span>
                      </td>
                      <td style={{ ...tdS, textAlign: 'right', whiteSpace: 'nowrap' }}>
                        {item.atribuidoA
                          ? <button onClick={() => onReturn(item)} style={{ ...btn.ghost, fontSize: 11, padding: '5px 10px', marginRight: 6 }}>Devolver</button>
                          : <button onClick={() => { setAssignItem(item); setAssignPc(pcs[0]?.pc || ''); }}
                              style={{ ...btn.primary, fontSize: 11, padding: '5px 10px', marginRight: 6 }}>Atribuir</button>
                        }
                        <button onClick={() => onEdit(item)} style={{ ...btn.ghost, padding: '5px 8px', marginRight: 4 }}><Edit3 size={12} /></button>
                        <button onClick={() => onDelete(item)} style={{ ...btn.danger, padding: '5px 8px' }}><Trash2 size={12} /></button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {assignItem && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.7)', zIndex: 1001, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}
          onClick={e => e.target === e.currentTarget && setAssignItem(null)}>
          <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 10, padding: 28, width: '100%', maxWidth: 420, boxShadow: '0 24px 64px rgba(0,0,0,.6)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <div style={{ fontWeight: 700, fontSize: 16 }}>Atribuir a PC</div>
              <button onClick={() => setAssignItem(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: t.textDim }}><X size={18} /></button>
            </div>
            <div style={{ marginBottom: 14, fontSize: 13, color: t.textDim }}>
              Item: <strong style={{ color: t.text }}>{tipoLabel(assignItem.tipo)} {assignItem.marca} {assignItem.modelo}</strong>
            </div>
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 10, color: t.textDim, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.06em', fontFamily: 'JetBrains Mono, monospace' }}>Selecionar PC</label>
              <select value={assignPc} onChange={e => setAssignPc(e.target.value)} style={{ ...inp, width: '100%' }}>
                {pcs.map(p => <option key={p.pc} value={p.pc}>{p.pc}{p.utilizador ? ` — ${p.utilizador.split('\\').pop()}` : ''}</option>)}
              </select>
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button onClick={() => setAssignItem(null)} style={{ ...btn.ghost }}>Cancelar</button>
              <button onClick={handleConfirmAssign} disabled={!assignPc}
                style={{ ...btn.primary, opacity: assignPc ? 1 : 0.5 }}>
                Confirmar Atribuição
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

  const btn = useButtonStyles();
  return (
    <header style={{
      borderBottom: `1px solid ${t.border}`, background: t.bgPanel,
      position: 'sticky', top: 0, zIndex: 50, boxShadow: t.shadow,
    }}>
      <div style={{
        maxWidth: 1600, margin: '0 auto', padding: '14px 24px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        gap: 20, flexWrap: 'wrap',
      }}>
        <div>
          <div style={{
            fontSize: 10, color: t.accent, letterSpacing: '0.18em',
            textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace',
            fontWeight: 600,
          }}>INEGI · UMEC</div>
          <div style={{
            fontSize: 17, color: t.text, fontWeight: 700,
            marginTop: 2, letterSpacing: '-0.01em',
          }}>Gestão de Equipamento Informático</div>
        </div>

        <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          {lastSaved && (
            <div style={{
              fontSize: 10, color: t.textDim,
              fontFamily: 'JetBrains Mono, monospace',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: t.success }} />
              Guardado {new Date(lastSaved).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}
            </div>
          )}
          <button
            onClick={() => setTheme(themeName === 'dark' ? 'light' : 'dark')}
            style={{ ...btn.ghost, padding: '9px 12px' }}
            title={themeName === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro'}
          >
            {themeName === 'dark' ? <Sun size={13} /> : <Moon size={13} />}
            {themeName === 'dark' ? 'Claro' : 'Escuro'}
          </button>
          <button onClick={onThresholds} style={btn.ghost} title="Configurar critérios de classificação">
            <SlidersHorizontal size={13} /> Critérios
          </button>
          <button onClick={onBackup} style={btn.ghost} title="Gravar / carregar backup partilhado">
            <Database size={13} /> Backup
          </button>
          <button onClick={onExport} style={btn.ghost}>
            <Download size={13} /> CSV
          </button>
          <button onClick={onReset} style={{ ...btn.ghost, color: t.dangerText, borderColor: t.dangerBorder }}>
            <RefreshCw size={13} /> Reset
          </button>
        </div>
      </div>

      <div style={{ maxWidth: 1600, margin: '0 auto', padding: '0 24px', display: 'flex', gap: 4 }}>
        {[
          { k: 'dashboard', l: 'Dashboard', I: LayoutDashboard },
          { k: 'inventory', l: 'Inventário', I: FileSpreadsheet },
          { k: 'peripherals', l: 'Periféricos', I: Keyboard },
          { k: 'warehouse', l: 'Armazém', I: Package },
          { k: 'planning', l: 'Plano de Substituição', I: Wrench },
        ].map(({ k, l, I }) => (
          <button key={k} onClick={() => setView(k)} style={{
            padding: '12px 18px', background: 'transparent',
            border: 'none', cursor: 'pointer', display: 'flex',
            alignItems: 'center', gap: 8,
            color: view === k ? t.accent : t.textDim,
            borderBottom: `2px solid ${view === k ? t.accent : 'transparent'}`,
            fontSize: 12, fontWeight: 600, letterSpacing: '0.04em',
            fontFamily: 'JetBrains Mono, monospace',
            textTransform: 'uppercase', transition: 'all 0.15s', marginBottom: -1,
          }}>
            <I size={14} /> {l}
          </button>
        ))}
      </div>
    </header>
  );
};

// ===== Main App Inner (uses theme context) =====
const AppInner = ({ themeName, setTheme, setThresholds, resetThresholds }) => {
  const t = useTheme();
  const thresholds = useThresholdsCtx();
  const { custom: customFunctions, replaceCustomFunctions } = useFunctions();
  const { pcs, setPcs, loaded, lastSaved, reset } = useStorage();
  const { items: peripherals, setItems: setPeripherals, loaded: periphLoaded } = usePeripheralsStorage();
  const { items: warehouseItems, setItems: setWarehouseItems, loaded: warehouseLoaded } = useWarehouseStorage();
  const [view, setView] = useState('dashboard');
  const [navFilters, setNavFilters] = useState({});
  const [navSeq, setNavSeq] = useState(0);
  const handleDashNavigate = (v, filters = {}) => { setView(v); setNavFilters(filters); setNavSeq(s => s + 1); };
  const [editing, setEditing] = useState(null);
  const [isNewEdit, setIsNewEdit] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [confirmAbate, setConfirmAbate] = useState(null);
  const [confirmPerdido, setConfirmPerdido] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [showThresholds, setShowThresholds] = useState(false);
  const [showBackup, setShowBackup] = useState(false);
  const [showConfirmLinks, setShowConfirmLinks] = useState(false);
  // Peripherals modal state
  const [periphEditing, setPeriphEditing] = useState(null);
  const [isNewPeriph, setIsNewPeriph] = useState(false);
  const [confirmDelPeriph, setConfirmDelPeriph] = useState(null);
  // Warehouse modal state
  const [warehouseEditing, setWarehouseEditing] = useState(null);
  const [isNewWarehouse, setIsNewWarehouse] = useState(false);
  const [confirmDelWarehouse, setConfirmDelWarehouse] = useState(null);

  const handleSave = async (rec, originalPc) => {
    let next;
    if (isNewEdit) {
      if (pcs.some(p => p.pc === rec.pc)) {
        alert('Já existe um PC com este nome.'); return;
      }
      next = [...pcs, rec];
    } else {
      // originalPc tells us which row to update — important for renames where rec.pc !== originalPc
      const lookupKey = originalPc || rec.pc;
      next = pcs.map(p => p.pc === lookupKey ? rec : p);
    }
    next = recomputeRanks(next);
    await setPcs(next);
    setEditing(null);
    setIsNewEdit(false);
  };

  const handleDelete = async () => {
    const next = recomputeRanks(pcs.filter(p => p.pc !== confirmDel.pc));
    await setPcs(next);
    setConfirmDel(null);
  };

  const handleMarkTBR = async (p) => {
    const next = pcs.map(x => x.pc === p.pc ? { ...x, estado: 'TBR' } : x);
    await setPcs(next);
  };

  const handleAbate = async () => {
    const next = recomputeRanks(pcs.map(x => x.pc === confirmAbate.pc ? { ...x, abatido: true } : x));
    await setPcs(next);
    setConfirmAbate(null);
  };

  const handleRestore = async (p) => {
    const next = recomputeRanks(pcs.map(x => x.pc === p.pc ? { ...x, abatido: false } : x));
    await setPcs(next);
  };

  const handleMarkLost = async () => {
    const next = recomputeRanks(pcs.map(x => x.pc === confirmPerdido.pc ? { ...x, perdido: true, abatido: false } : x));
    await setPcs(next);
    setConfirmPerdido(null);
  };

  const handleRestoreLost = async (p) => {
    const next = recomputeRanks(pcs.map(x => x.pc === p.pc ? { ...x, perdido: false } : x));
    await setPcs(next);
  };

  const handleConfirmReview = async (p) => {
    const next = pcs.map(x => x.pc === p.pc ? { ...x, lastReview: todayISO() } : x);
    await setPcs(next);
  };

  // Peripherals handlers
  const handleSavePeriph = async (rec) => {
    let next;
    if (isNewPeriph) {
      next = [...peripherals, rec];
    } else {
      next = peripherals.map(x => x.id === rec.id ? rec : x);
    }
    await setPeripherals(next);
    setPeriphEditing(null);
    setIsNewPeriph(false);
  };

  const handleDeletePeriph = async () => {
    const next = peripherals.filter(x => x.id !== confirmDelPeriph.id);
    await setPeripherals(next);
    setConfirmDelPeriph(null);
  };

  const handleSaveWarehouse = async (rec) => {
    const next = isNewWarehouse
      ? [...warehouseItems, { ...rec, _persisted: true }]
      : warehouseItems.map(x => x.id === rec.id ? { ...rec, _persisted: true } : x);
    await setWarehouseItems(next);
    setWarehouseEditing(null);
    setIsNewWarehouse(false);
  };

  const handleDeleteWarehouse = async () => {
    await setWarehouseItems(warehouseItems.filter(x => x.id !== confirmDelWarehouse.id));
    setConfirmDelWarehouse(null);
  };

  const handleAssignWarehouse = async (item, pcName) => {
    const today = new Date().toISOString().slice(0, 10);
    const next = warehouseItems.map(x => x.id === item.id ? { ...x, atribuidoA: pcName, atribuidoEm: today } : x);
    await setWarehouseItems(next);
  };

  const handleReturnWarehouse = async (item) => {
    const next = warehouseItems.map(x => x.id === item.id ? { ...x, atribuidoA: null, atribuidoEm: null } : x);
    await setWarehouseItems(next);
  };

  // Apply an imported backup: replaces PCs, peripherals, and (if present) thresholds.
  // Recomputes ranks on the imported PCs in case the file came from an older version.
  const handleImportBackup = async (data) => {
    // Apply schema migration to imported PCs in case the backup is from an
    // older version with legacy function codes (DN, Service, old DU=Disp.Uso)
    const migrated = migratePcsV1toV2(data.pcs || []);
    const importedPcs = recomputeRanks(migrated);
    await setPcs(importedPcs);
    await setPeripherals(data.peripherals || []);
    if (data.thresholds) {
      await setThresholds(data.thresholds);
    }
    if (data.customFunctions) {
      await replaceCustomFunctions(data.customFunctions);
    }
    // Mark schema as up to date after import
    try { await window.storage.set(SCHEMA_VERSION_KEY, String(PCS_SCHEMA_VERSION)); } catch {}
    setShowBackup(false);
  };

  const downloadCSV = (rows, filename) => {
    if (rows.length === 0) {
      alert('Não há dados para exportar.');
      return;
    }
    const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  const escapeCSV = (v) => {
    const s = String(v ?? '').replace(/"/g, '""');
    return /[,"\n]/.test(s) ? `"${s}"` : s;
  };

  // Context-aware export: PCs CSV when on dashboard/inventory/planning, Peripherals CSV when on peripherals tab
  const exportCSV = () => {
    if (view === 'peripherals') {
      const cols = ['utilizador',
        'monitor1Present', 'monitor1Brand', 'monitor1Size', 'monitor1Status',
        'monitor2Present', 'monitor2Brand', 'monitor2Size', 'monitor2Status',
        // Build per-peripheral columns based on type:
        //   full + canBePersonal → Present, Brand, Status, Personal
        //   full only            → Present, Brand, Status
        //   check-only           → Present
        ...SINGLE_PERIPHERALS.flatMap(item => {
          if (item.type === 'check') return [item.key + 'Present'];
          const base = [item.key + 'Present', item.key + 'Brand', item.key + 'Status'];
          if (item.canBePersonal) base.push(item.key + 'Personal');
          return base;
        }),
        'notes'];
      const headers = cols.join(',');
      const rows = peripherals.map(rec => cols.map(c => escapeCSV(rec[c])).join(','));
      downloadCSV([headers, ...rows], `inegi_umec_perifericos_${new Date().toISOString().slice(0, 10)}.csv`);
    } else {
      const cols = ['rank', 'pc', 'utilizador', 'funcao', 'ubicacao', 'estado',
        'disponibilidade', 'ano', 'idadeAnos',
        'so', 'cpuClean', 'cpuScore', 'memMB', 'gpuClean', 'gpuScore',
        'totalScore', 'disks', 'ultComunic', 'lastReview', 'notas', 'abatido', 'perdido'];
      const headers = cols.join(',');
      const rows = pcs.map(p => cols.map(c => escapeCSV(p[c])).join(','));
      downloadCSV([headers, ...rows], `inegi_umec_pcs_${new Date().toISOString().slice(0, 10)}.csv`);
    }
  };

  if (!loaded || !periphLoaded || !warehouseLoaded) {
    return (
      <div style={{
        minHeight: '100vh', background: t.bg, display: 'flex',
        alignItems: 'center', justifyContent: 'center', color: t.accent,
        fontFamily: 'JetBrains Mono, monospace', fontSize: 13,
      }}>
        <RefreshCw size={16} style={{ marginRight: 8, animation: 'spin 1s linear infinite' }} />
        A carregar inventário...
      </div>
    );
  }

  return (
    <div style={{
      minHeight: '100vh', background: t.bg, color: t.text,
      fontFamily: 'Inter, sans-serif', transition: 'background 0.2s, color 0.2s',
    }}>
      <Header
        view={view} setView={setView} lastSaved={lastSaved}
        onExport={exportCSV} onReset={() => setConfirmReset(true)}
        themeName={themeName} setTheme={setTheme}
        onThresholds={() => setShowThresholds(true)}
        onBackup={() => setShowBackup(true)}
      />

      <main style={{ maxWidth: 1600, margin: '0 auto', padding: 24 }}>
        {view === 'dashboard' && <Dashboard pcs={pcs} onNavigate={handleDashNavigate} />}
        {view === 'inventory' && (
          <Inventory pcs={pcs}
            onEdit={(p) => { setEditing(p); setIsNewEdit(false); }}
            onDelete={(p) => setConfirmDel(p)}
            onAdd={() => { setIsNewEdit(true); setEditing({}); }}
            onConfirm={handleConfirmReview}
            onShowLinks={() => setShowConfirmLinks(true)}
            onAbate={(p) => setConfirmAbate(p)}
            onRestore={handleRestore}
            onMarkLost={(p) => setConfirmPerdido(p)}
            onRestoreLost={handleRestoreLost}
            navFilters={navFilters} navSeq={navSeq} />
        )}
        {view === 'peripherals' && (
          <Peripherals items={peripherals}
            onEdit={(rec) => { setPeriphEditing(rec); setIsNewPeriph(false); }}
            onDelete={(rec) => setConfirmDelPeriph(rec)}
            onAdd={() => { setIsNewPeriph(true); setPeriphEditing(newPeripheralRecord()); }} />
        )}
        {view === 'warehouse' && (
          <Warehouse items={warehouseItems} pcs={pcs}
            onAdd={() => { setIsNewWarehouse(true); setWarehouseEditing(newWarehouseItem()); }}
            onEdit={(item) => { setIsNewWarehouse(false); setWarehouseEditing({ ...item, _persisted: true }); }}
            onDelete={(item) => setConfirmDelWarehouse(item)}
            onAssign={handleAssignWarehouse}
            onReturn={handleReturnWarehouse} />
        )}
        {view === 'planning' && (
          <Planning pcs={pcs} onMarkTBR={handleMarkTBR}
            onEdit={(p) => { setEditing(p); setIsNewEdit(false); }} />
        )}
      </main>

      <footer style={{
        borderTop: `1px solid ${t.border}`, padding: '18px 24px',
        marginTop: 40, color: t.textFaint,
        fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
        textAlign: 'center', letterSpacing: '0.06em',
      }}>
        UMEC · Materiais e Estruturas Compósitas · Dados sincronizados localmente · v1.10
      </footer>

      {editing !== null && (
        <EditModal
          pc={isNewEdit ? null : editing}
          isNew={isNewEdit}
          existingPcs={pcs}
          onSave={handleSave}
          onClose={() => { setEditing(null); setIsNewEdit(false); }}
        />
      )}

      {showThresholds && (
        <ThresholdsModal
          pcs={pcs}
          onSave={async (next) => { await setThresholds(next); setShowThresholds(false); }}
          onReset={async () => { await resetThresholds(); }}
          onClose={() => setShowThresholds(false)}
        />
      )}

      {showBackup && (
        <BackupModal
          pcs={pcs}
          peripherals={peripherals}
          thresholds={thresholds}
          customFunctions={customFunctions}
          onImport={handleImportBackup}
          onClose={() => setShowBackup(false)}
        />
      )}

      {showConfirmLinks && (
        <ConfirmLinksModal pcs={pcs} onClose={() => setShowConfirmLinks(false)} />
      )}

      {confirmDel && (
        <Confirm title="Eliminar equipamento?"
          message={`Esta ação irá remover ${confirmDel.pc} do inventário. Esta operação não pode ser revertida.`}
          danger onYes={handleDelete} onNo={() => setConfirmDel(null)} />
      )}

      {confirmAbate && (
        <Confirm title="Abater equipamento?"
          message={`${confirmAbate.pc} ficará marcado como abatido e ocultado do inventário activo. Pode ser restaurado em qualquer altura.`}
          danger onYes={handleAbate} onNo={() => setConfirmAbate(null)} />
      )}

      {confirmPerdido && (
        <Confirm title="Marcar como perdido?"
          message={`${confirmPerdido.pc} ficará marcado como perdido e ocultado do inventário activo. Pode ser restaurado quando o equipamento for encontrado.`}
          danger onYes={handleMarkLost} onNo={() => setConfirmPerdido(null)} />
      )}

      {confirmReset && (
        <Confirm title="Restaurar dados originais?"
          message="Todas as alterações guardadas serão substituídas pelos dados iniciais do ficheiro Excel. Esta operação não pode ser revertida."
          danger
          onYes={async () => { await reset(); setConfirmReset(false); }}
          onNo={() => setConfirmReset(false)} />
      )}

      {periphEditing !== null && (
        <PeripheralEditModal
          rec={periphEditing}
          isNew={isNewPeriph}
          onSave={handleSavePeriph}
          onClose={() => { setPeriphEditing(null); setIsNewPeriph(false); }}
        />
      )}

      {confirmDelPeriph && (
        <Confirm title="Eliminar registo de periféricos?"
          message={`Esta ação irá remover o registo de ${(confirmDelPeriph.utilizador || '').replace('INEGI\\\\', '') || 'utilizador sem nome'}. Esta operação não pode ser revertida.`}
          danger
          onYes={handleDeletePeriph}
          onNo={() => setConfirmDelPeriph(null)} />
      )}

      {warehouseEditing !== null && (
        <WarehouseItemForm
          item={warehouseEditing}
          onSave={handleSaveWarehouse}
          onClose={() => { setWarehouseEditing(null); setIsNewWarehouse(false); }} />
      )}

      {confirmDelWarehouse && (
        <Confirm title="Eliminar item do armazém?"
          message={`Esta ação irá remover "${confirmDelWarehouse.marca || ''} ${confirmDelWarehouse.modelo || ''}".`.trim()}
          danger
          onYes={handleDeleteWarehouse}
          onNo={() => setConfirmDelWarehouse(null)} />
      )}
    </div>
  );
};

// ===== Root with theme provider =====
function App() {
  const { theme, themeName, setTheme, loaded: themeLoaded } = useThemePersisted();
  const { thresholds, setThresholds, resetThresholds, loaded: thresholdsLoaded } = useThresholdsPersisted();
  const functions = useFunctionsPersisted();

  if (!themeLoaded || !thresholdsLoaded || !functions.loaded) {
    return (
      <div style={{
        minHeight: '100vh', background: '#0a0f17', display: 'flex',
        alignItems: 'center', justifyContent: 'center',
      }} />
    );
  }

  return (
    <ThemeContext.Provider value={theme}>
      <ThresholdsContext.Provider value={thresholds}>
        <FunctionsContext.Provider value={functions}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
            * { box-sizing: border-box; }
            @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
            .spin { animation: spin 1s linear infinite; }
            body { margin: 0; }
            select option { background: ${theme.bgPanelAlt}; color: ${theme.text}; }
            ::-webkit-scrollbar { height: 8px; width: 8px; }
            ::-webkit-scrollbar-track { background: ${theme.bg}; }
            ::-webkit-scrollbar-thumb { background: ${theme.border}; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: ${theme.borderStrong}; }
            input::placeholder { color: ${theme.textFaint}; }
          `}</style>
          <AppInner
            themeName={themeName}
            setTheme={setTheme}
            setThresholds={setThresholds}
            resetThresholds={resetThresholds}
          />
        </FunctionsContext.Provider>
      </ThresholdsContext.Provider>
    </ThemeContext.Provider>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
const boot = document.getElementById('boot');
if (boot) boot.remove();
</script>
</body>
</html>
